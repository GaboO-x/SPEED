<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberattack Dictionary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-page:#171c23; --text:#e5e7eb; --container-bg:#171c23;
            --card-bg:#151a21; --card-border:#fddf0057;
            --heading:#e5e7eb; --heading-2:#cbd5e1;
            --input-bg:#151a21; --input-border:#e8d800;
            --modal-overlay:rgba(0,0,0,0.70); --modal-bg:#0f172a;
            --muted:#94a3b8; --badge-bg:#1e293b; --badge-text:#94a3b8;
        }

        body { font-family:"Inter",sans-serif; background-color:var(--bg-page); color:var(--text); padding:20px; margin:0; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        .container { background-color:var(--container-bg); padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.1); width:100%; max-width:1200px; }
        h1 { text-align:center; color:var(--heading); margin-bottom:8px; font-size:2rem; font-weight:700; }
        .subtitle { text-align:center; color:var(--muted); font-size:.9rem; margin-bottom:28px; }
        #searchInput { background-color:var(--input-bg); color:var(--text); border-color:var(--input-border); }
        #searchInput::placeholder { color:var(--muted); }

        /* Category heading — no counter */
        .cat-heading { color:var(--heading-2); border-bottom:2px solid var(--card-border); padding-bottom:6px; margin-bottom:14px; margin-top:32px; font-size:1.15rem; font-weight:700; display:flex; align-items:center; gap:8px; }

        /* Cards */
        .attack-card { background-color:var(--card-bg); border:1px solid var(--card-border); border-radius:.75rem; padding:1rem; box-shadow:0 2px 6px rgba(0,0,0,.06); transition:transform .2s, box-shadow .2s; cursor:pointer; display:flex; flex-direction:column; align-items:center; text-align:center; }
        .attack-card:hover { transform:translateY(-4px); box-shadow:0 8px 18px rgba(0,0,0,.12); }
        .attack-card .icon-container { font-size:1.75rem; margin-bottom:.5rem; }
        .attack-card .attack-name { font-weight:700; font-size:.85rem; color:var(--heading); line-height:1.3; }

        /* Modal */
        #attackModal { background-color:var(--modal-overlay); }
        #attackModal > div { background-color:var(--modal-bg); color:var(--text); }
        #closeModalBtn { color:var(--muted); }
        #modalAttackName { color:var(--heading); }
        #modalAttackCategory { color:var(--muted); }

        /* Modal section labels — no bold, slightly larger, white */
        .modal-section-label {
            font-size:.78rem; font-weight:400; text-transform:uppercase;
            letter-spacing:.09em; color:#ffffff; margin-bottom:7px; margin-top:18px;
            display:flex; align-items:center; gap:6px;
        }
        .modal-section-label::before {
            content: "-->";
            font-weight:400;
            margin-right:4px;
        }
        .modal-section-label:first-of-type { margin-top:0; }
        .modal-desc { margin-bottom: 18px; }
        .modal-recs, .modal-prevs { margin-bottom: 18px; }

        /* All modal text is white, no colored boxes */
        .modal-desc { font-size:.875rem; line-height:1.6; color:var(--text); }

        .modal-recs, .modal-prevs { padding:0; background:none; border:none; }
        .modal-recs li, .modal-prevs li {
            font-size:.82rem; line-height:1.55; color:var(--text);
            margin-bottom:6px; padding-left:4px;
        }
        .modal-recs li:last-child, .modal-prevs li:last-child { margin-bottom:0; }

        /* Copy button */
        .modal-copy-btn { background:#1d395f; color:#fff; padding:8px 18px; border-radius:8px; border:none; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:.88rem; font-weight:600; transition:background .2s; margin-top:16px; }
        .modal-copy-btn:hover { background:#12243e; }
        .modal-copy-btn.copied { background:#16a34a; }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width:6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background:#0b1220; border-radius:10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:10px; }

        .no-results { text-align:center; color:var(--muted); padding:40px 0; font-size:1rem; }
        #searchResultCount { color:var(--muted); }

        /* Severity badges */
        .sev-badge { display:inline-block; font-size:.65rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 8px; border-radius:999px; }
        .sev-Critical { background:#7f1d1d; color:#fecaca; }
        .sev-High { background:#7c2d12; color:#fed7aa; }
        .sev-Medium { background:#78350f; color:#fde68a; }
        .sev-Low { background:#374151; color:#d1d5db; }

        .attack-card { position:relative; }
        .card-sev-badge { position:absolute; top:6px; right:6px; font-size:.55rem; padding:1px 6px; }

        /* Favorite star on card */
        .card-fav-btn { position:absolute; top:6px; left:6px; font-size:.85rem; color:var(--muted); background:none; border:none; cursor:pointer; padding:2px; line-height:1; z-index:2; }
        .card-fav-btn:hover { color:#f5b100; }
        .card-fav-btn.favorited { color:#f5b100; }
        .card-fav-btn.favorited i { font-weight:900; }

        /* Favorites filter button next to search bar */
        .fav-filter-btn { background:var(--input-bg); border:1px solid var(--input-border); color:var(--muted); border-radius:8px; padding:0 14px; height:46px; cursor:pointer; font-size:1rem; transition:color .2s, border-color .2s; }
        .fav-filter-btn:hover { color:#f5b100; }
        .fav-filter-btn.active { color:#f5b100; border-color:#f5b100; }

        /* Favorite star in modal header */
        #modalFavBtn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.15rem; margin-left:auto; padding:4px; }
        #modalFavBtn:hover { color:#f5b100; }
        #modalFavBtn.favorited { color:#f5b100; }

        .mitre-badge { display:inline-flex; align-items:center; gap:2px; font-size:.65rem; font-weight:600; letter-spacing:.02em; padding:2px 8px; border-radius:999px; background:#1d395f; color:#bfdbfe; margin-left:6px; font-family:monospace; }
        .mitre-id-link { cursor:pointer; text-decoration:underline; text-underline-offset:2px; }
        .mitre-id-link:hover { color:#fff; }
        .mitre-sep { opacity:.6; }

        .port-chip { display:inline-block; font-size:.78rem; font-family:monospace; padding:2px 8px; margin:2px 3px 2px 0; border-radius:6px; border:1px solid var(--card-border); background:var(--badge-bg); color:var(--badge-text); cursor:pointer; transition:background .15s, border-color .15s; }
        .port-chip:hover { background:#1d395f; color:#bfdbfe; border-color:#1d395f; }

        @media(max-width:768px) { h1 { font-size:1.5rem; } .container { padding:16px; } }
    </style>
</head>
<body>
<div class="container mx-auto">
    <div class="flex justify-center items-center gap-2 mb-6">
        <input type="text" id="searchInput" placeholder="Search attacks or categories..."
               class="w-full max-w-md p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm text-sm">
        <button id="favFilterBtn" title="Show favorites only" class="fav-filter-btn"><i class="fas fa-star"></i></button>
    </div>
    <div id="searchResultCount" class="text-center text-sm mb-4" style="display:none;"></div>
    <div id="attackCardsContainer" class="flex flex-col"></div>
</div>

<!-- Modal -->
<div id="attackModal" class="fixed inset-0 flex items-center justify-center p-4 z-50 hidden">
    <div class="rounded-xl p-7 max-w-2xl w-full shadow-2xl relative max-h-screen overflow-y-auto custom-scrollbar">
        <button id="closeModalBtn" class="absolute top-4 right-4 text-2xl leading-none">&times;</button>
        <div class="flex items-center gap-3 mb-4">
            <i id="modalAttackIcon" class="text-3xl"></i>
            <div>
                <h2 id="modalAttackName" class="text-xl font-bold leading-tight"></h2>
                <p id="modalAttackCategory" class="text-xs mt-0.5"></p>
                <span id="modalSeverity" class="sev-badge mt-1"></span>
                <span id="modalMitre" class="mitre-badge mt-1"></span>
            </div>
            <button id="modalFavBtn" title="Toggle favorite"><i class="fas fa-star"></i></button>
        </div>

        <div class="modal-section-label">Description</div>
        <div id="modalAttackDescription" class="modal-desc mb-2"></div>

        <div id="portsSection" style="display:none;">
            <div class="modal-section-label"><i class="fas fa-network-wired"></i> Common Ports</div>
            <div id="modalPorts" class="modal-desc mb-2"></div>
        </div>

        <div class="modal-section-label"><i class="fas fa-magnifying-glass"></i> Look For / Rule Out (T2 Triage)</div>
        <ul id="modalChecklist" class="modal-recs list-none"></ul>

        <button id="copyDescriptionBtn" class="modal-copy-btn">
            <i class="fas fa-copy"></i> Copy for report
        </button>
    </div>
</div>

<div id="messageContainer" class="fixed bottom-4 right-4 z-50"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

const cyberattacksData = [
  {
    category: "Malware",
    icon: "fas fa-virus",
    attacks: [
      {
        name: "Virus", icon: "fas fa-virus", color: "#7f8c8d", severity: "Medium", mitre: "T1204.002",
        description: "Malicious code that attaches to legitimate files and replicates when executed. Requires user interaction to spread. Can corrupt data, degrade performance, or serve as a dropper for additional payloads.",
        checklist: [
          "File hash in VT/EDR — confirm multi-engine detection before escalating.",
          "Parent process of the infected file (Office app, browser, USB?).",
          "Scope: single host or same hash across multiple endpoints (possible spread)?"
        ]
      },
      {
        name: "Worm", icon: "fas fa-bug", color: "#7f8c8d", severity: "High", mitre: "T1210",
        description: "Self-replicating malware that propagates across networks without user interaction by exploiting OS or application vulnerabilities. Can rapidly consume bandwidth and deliver secondary payloads.",
        ports: ["445 (SMB)", "135 (RPC)", "139 (NetBIOS)", "22 (SSH, depending on exploited service)"],
        checklist: [
          "Anomalous SMB/RPC traffic between hosts (ports 445, 135) — indicates internal propagation.",
          "Multiple hosts generating the same connection pattern in a short window.",
          "Exploited vulnerability — verify patch/CVE status before ruling out as false positive."
        ]
      },
      {
        name: "Trojan", icon: "fas fa-horse", color: "#7f8c8d", severity: "High", mitre: "T1204.002",
        description: "Malware disguised as legitimate software. Once executed, it establishes backdoors, exfiltrates data, or installs additional components. Relies on social engineering for distribution.",
        checklist: [
          "Legitimate-looking process with an unusual hash or path (e.g. svchost.exe outside System32).",
          "Outbound connections to a non-corporate IP/domain shortly after execution.",
          "Persistence: Run registry keys, scheduled tasks, new services."
        ]
      },
      {
        name: "Ransomware", icon: "fas fa-lock", color: "#7f8c8d", severity: "Critical", mitre: "T1486",
        description: "Encrypts victim files or locks system access, demanding cryptocurrency payment for decryption. Impact includes data loss, service disruption, and reputational damage if backups are unavailable.",
        checklist: [
          "File modification/rename rate (unknown extension appearing en masse) via EDR/SIEM.",
          "Shadow copy deletion (vssadmin delete shadows) — critical signal, not a false positive.",
          "Encryption source host/account and its reach into network shares before isolating."
        ]
      },
      {
        name: "Spyware", icon: "fas fa-eye", color: "#7f8c8d", severity: "High", mitre: "T1056",
        description: "Silently collects sensitive user data — keystrokes, credentials, screenshots, browsing history — and transmits it to the attacker. Used for espionage, credential theft, and identity fraud.",
        checklist: [
          "Processes with input access (keyboard/screen) lacking a signature or valid business context.",
          "Periodic, low-volume outbound traffic to an external domain (beaconing).",
          "Confirm actual exfiltration vs. legitimate telemetry from authorized monitoring software."
        ]
      },
      {
        name: "Rootkit", icon: "fas fa-user-secret", color: "#7f8c8d", severity: "Critical", mitre: "T1014",
        description: "Modifies OS kernel or user-space to conceal attacker presence and maintain persistent privileged access. Evades standard AV detection. Removal often requires offline scanning or OS reinstallation.",
        checklist: [
          "Discrepancy between what the OS reports and low-level tools show (hidden processes/ports).",
          "Unsigned or abnormally loaded kernel drivers/modules.",
          "Kernel-mode EDR alerts (syscall hooking) — do not dismiss without forensic analysis.",
          "Event ID 6 (Sysmon driver load) for unsigned/unknown drivers."
        ]
      },
      {
        name: "Botnet", icon: "fas fa-robot", color: "#7f8c8d", severity: "High", mitre: "N/A",
        description: "Network of compromised hosts controlled remotely via C2 infrastructure. Used for DDoS, spam, credential theft, and ransomware distribution at scale.",
        checklist: [
          "Regular beaconing pattern to the same C2 across multiple hosts.",
          "Unusual C2 protocol or user-agent (IRC, HTTP with odd headers).",
          "Cross-check IP/domain against threat intel before closing as benign."
        ]
      },
      {
        name: "Keylogger", icon: "fas fa-keyboard", color: "#7f8c8d", severity: "High", mitre: "T1056.001",
        description: "Records all keystrokes, capturing passwords, financial data, and sensitive input. Can be software-based (malware) or hardware-based (physical device on keyboard cable).",
        checklist: [
          "Keyboard hooks (SetWindowsHookEx) or capture drivers without valid signing.",
          "Local log files with keystroke timestamps — location and growth rate.",
          "Rule out authorized HR/monitoring software before escalating as an incident."
        ]
      },
      {
        name: "Fileless Malware", icon: "fas fa-ghost", color: "#7f8c8d", severity: "High", mitre: "T1059",
        description: "Executes entirely in memory using legitimate OS tools (PowerShell, WMI, LOLBins) without writing to disk. Evades signature-based AV. Identified through behavioral analysis and memory forensics.",
        checklist: [
          "PowerShell/WMI/LOLBin commands with obfuscation flags (-enc, -w hidden).",
          "No disk artifact but persistence via registry (WMI subscriptions, Run keys).",
          "Unusual parent process spawning PowerShell (e.g. Winword.exe → powershell.exe).",
          "Event ID 4688 (process creation) with command-line auditing enabled, plus Sysmon Event ID 1."
        ]
      },
      {
        name: "Cryptojacking", icon: "fas fa-coins", color: "#7f8c8d", severity: "Medium", mitre: "T1496",
        description: "Hijacks victim CPU/GPU to mine cryptocurrency without authorization. Indicators include abnormal CPU spikes, performance degradation, and overheating. Delivered via malicious web scripts or malware.",
        ports: ["3333", "4444", "8080", "9999", "14444 (Stratum mining pools)"],
        checklist: [
          "Sustained CPU/GPU usage on the host with no business justification.",
          "Connection to a known mining pool (ports 3333, 4444, 8080 with Stratum protocol).",
          "Process disguised with a system service name but abnormally high resource use."
        ]
      },
      {
        name: "Logic Bomb", icon: "fas fa-bomb", color: "#7f8c8d", severity: "High", mitre: "N/A",
        description: "Dormant malicious code embedded in legitimate software, triggered by a specific condition (date, user action). Commonly planted by insiders. Activates to delete data, encrypt files, or disrupt operations.",
        checklist: [
          "Code with a trigger condition (date, event, user absence) in internal scripts.",
          "Review recent changes by a privileged user, especially before their departure/termination.",
          "Distinguish from a legitimate bug: look for intent — an atypical condition with no functional purpose."
        ]
      },
      {
        name: "Dropper", icon: "fas fa-box-open", color: "#7f8c8d", severity: "High", mitre: "T1105",
        description: "Malware that delivers and installs a secondary payload on the target. Designed to bypass initial controls and self-delete after execution to minimize forensic artifacts.",
        checklist: [
          "Small initial file that fetches an additional payload after execution — check for follow-up download traffic.",
          "Hash of the dropper vs. hash of the final payload — analyze both separately.",
          "Persistence established by the secondary payload, not just the dropper."
        ]
      },
      {
        name: "Adware", icon: "fas fa-rectangle-ad", color: "#7f8c8d", severity: "Low", mitre: "N/A",
        description: "Injects unwanted ads, redirects browser traffic, and collects user data for targeting. Often bundled with free software. Can serve as a gateway for more dangerous malware.",
        checklist: [
          "Browser extensions or bundled software installed without explicit consent.",
          "Search redirects/pop-ups — confirm whether a tracking/exfiltration component is present.",
          "Typically low impact: close quickly if no C2 or credential theft is involved."
        ]
      },
      {
        name: "Scareware", icon: "fas fa-triangle-exclamation", color: "#7f8c8d", severity: "Low", mitre: "N/A",
        description: "Displays fake security alerts to coerce users into purchasing fraudulent software or calling fake support lines. No real system threat; risk is financial and social engineering-based.",
        checklist: [
          "Fake pop-up/page mimicking an AV/OS alert — check whether the user executed anything after the lure.",
          "Confirm whether it was social engineering only (no execution) or led to real malware installation.",
          "Source domain against threat intel — common in malvertising campaigns."
        ]
      }
    ]
  },
  {
    category: "Social Engineering",
    icon: "fas fa-people-arrows",
    attacks: [
      {
        name: "Phishing", icon: "fas fa-fish", color: "#7f8c8d", severity: "Medium", mitre: "T1566",
        description: "Mass deceptive emails or messages impersonating trusted entities to harvest credentials or deliver malware. Uses urgency, fear, or reward as lures. First step in many multi-stage attacks.",
        checklist: [
          "Headers: From/Return-Path/Reply-To — look for a domain mismatch.",
          "SPF/DKIM/DMARC (pass/fail/none) and sender domain age (WHOIS).",
          "Did the user click/interact? Check proxy/EDR to confirm execution vs. delivery only."
        ]
      },
      {
        name: "Spear Phishing", icon: "fas fa-crosshairs", color: "#7f8c8d", severity: "High", mitre: "T1566.001 / T1566.002",
        description: "Targeted phishing using victim-specific information to increase credibility. Higher success rate than generic phishing; often precedes APT intrusions.",
        checklist: [
          "Level of personalization (name, role, real project) — indicates prior reconnaissance of the target.",
          "Verify whether the target has privileged access (finance, IT, executives).",
          "Correlate with similar emails sent to other users (broader targeted campaign?)."
        ]
      },
      {
        name: "Whaling", icon: "fas fa-user-tie", color: "#7f8c8d", severity: "High", mitre: "T1566",
        description: "Spear phishing targeting C-level executives or high-value individuals. Goal is large financial transfers or strategic data access. Messages mimic board communications or legal notices.",
        checklist: [
          "Target must be an executive/high-profile individual — confirm role before classifying as whaling vs. spear phishing.",
          "Urgent financial transfer or sensitive-data request in the email body.",
          "Look-alike domain (typosquat) impersonating the real executive's domain."
        ]
      },
      {
        name: "Vishing", icon: "fas fa-phone", color: "#7f8c8d", severity: "Medium", mitre: "T1566.004",
        description: "Voice-based phishing via phone. Attackers impersonate banks, IT support, or government agencies to extract credentials or OTP codes in real time. Increasingly automated with AI voice cloning.",
        checklist: [
          "Caller ID (spoofed) and script used — compare against prior user reports.",
          "Was sensitive information or credentials shared during the call?",
          "Correlate with subsequent login/MFA attempts from an anomalous location/IP."
        ]
      },
      {
        name: "Smishing", icon: "fas fa-sms", color: "#7f8c8d", severity: "Medium", mitre: "T1566",
        description: "Phishing via SMS. Messages contain malicious links or instruct victims to call fraudulent numbers. Exploits trust in mobile notifications from banks, couriers, or government agencies.",
        checklist: [
          "Originating number/short code and included link — analyze the link's domain (do not click).",
          "Confirm whether the user interacted with the link (proxy logs, DNS).",
          "Compare against other recent smishing reports (same campaign)."
        ]
      },
      {
        name: "Pretexting", icon: "fas fa-theater-masks", color: "#7f8c8d", severity: "Medium", mitre: "T1598",
        description: "Attacker builds a fabricated scenario to manipulate the victim into revealing information or taking an action. Involves sustained trust-building, unlike opportunistic phishing.",
        checklist: [
          "Scenario/pretext used (IT support, vendor, HR) — validate against the company's real processes.",
          "What information or access was obtained during the interaction?",
          "Check whether the attacker already had internal data beforehand (indicates reconnaissance)."
        ]
      },
      {
        name: "Baiting", icon: "fas fa-gift", color: "#7f8c8d", severity: "Medium", mitre: "T1091",
        description: "Offers enticing content (free software, media, USB drives) to lure victims into executing malicious content. Physical form involves infected USB drives left in accessible areas.",
        checklist: [
          "Physical or digital lure used (USB, free download) — was it connected/executed?",
          "If USB: isolate the host that connected it and analyze autorun/executables.",
          "Review CCTV/access control logs if the lure was physical, on-premises."
        ]
      },
      {
        name: "Quid Pro Quo", icon: "fas fa-handshake", color: "#7f8c8d", severity: "Low", mitre: "N/A",
        description: "Attacker offers a service (e.g., IT support) in exchange for credentials or access. Common in environments without strict identity verification procedures.",
        checklist: [
          "Offer used (fake tech support, prize) — confirm contact channel (call/email).",
          "Was software installed or credentials shared in exchange for the offer?",
          "Distinguish from pretexting: here there's an explicit exchange offered to the user."
        ]
      },
      {
        name: "Tailgating", icon: "fas fa-door-open", color: "#7f8c8d", severity: "Medium", mitre: "N/A",
        description: "Unauthorized person follows an authorized employee into a restricted area by exploiting social norms. Bypasses electronic access controls.",
        checklist: [
          "Review CCTV/access control logs at the reported time.",
          "Did the person without a badge reach a sensitive area (data center, server room)?",
          "Confirm the identity of the person who let them in — real employee vs. unknown."
        ]
      },
      {
        name: "Shoulder Surfing", icon: "fas fa-eye-slash", color: "#7f8c8d", severity: "Low", mitre: "N/A",
        description: "Direct observation of a victim's screen or input in public spaces to capture PINs, passwords, or confidential data. Low-tech but effective.",
        checklist: [
          "Location and context (public space, open office) where it occurred.",
          "What sensitive information was visible (credentials, customer data)?",
          "If credential compromise is suspected, force a reset as a precaution."
        ]
      },
      {
        name: "Dumpster Diving", icon: "fas fa-trash", color: "#7f8c8d", severity: "Low", mitre: "N/A",
        description: "Physical recovery of sensitive information from discarded documents, drives, or devices. Yields passwords, org charts, and infrastructure details that inform further attacks.",
        checklist: [
          "Type of document recovered (printouts with sensitive data, credentials, network diagrams).",
          "Verify document destruction policy (shredding) in the affected area.",
          "Assess whether the recovered information could enable a subsequent targeted attack."
        ]
      },
      {
        name: "Watering Hole Attack", icon: "fas fa-water", color: "#7f8c8d", severity: "High", mitre: "T1189",
        description: "Compromises a website frequently visited by a specific target group. Victims are silently infected upon visiting the legitimate site. Used in targeted industry campaigns.",
        checklist: [
          "Legitimate site compromised — confirm whether it's regularly used by the target group.",
          "Analyze the injected payload/script (selective delivery condition by IP/user-agent).",
          "Check whether other users in the organization visited the same site in the time window."
        ]
      },
      {
        name: "Business Email Compromise (BEC)", icon: "fas fa-envelope-open-text", color: "#7f8c8d", severity: "Critical", mitre: "T1566 / T1078",
        description: "Impersonates a trusted executive or vendor via spoofed or compromised email to authorize fraudulent wire transfers or data disclosure. One of the highest-financial-impact attack types per FBI IC3.",
        checklist: [
          "Email thread — was there an actual account compromise (suspicious login) or just domain impersonation?",
          "Request to change banking details/wire transfer — validate through an out-of-band channel before acting.",
          "Check for forwarding/hiding rules configured on the mailbox (indicator of a compromised account)."
        ]
      }
    ]
  },
  {
    category: "Network Attacks",
    icon: "fas fa-network-wired",
    attacks: [
      {

    const searchInput       = document.getElementById('searchInput');
    const container         = document.getElementById('attackCardsContainer');
    const attackModal       = document.getElementById('attackModal');
    const closeModalBtn     = document.getElementById('closeModalBtn');

    const modalName         = document.getElementById('modalAttackName');
    const modalCategory     = document.getElementById('modalAttackCategory');

    const modalMitre        = document.getElementById('modalMitre');
    const modalDesc         = document.getElementById('modalAttackDescription');
    const portsSection      = document.getElementById('portsSection');
    const modalPorts        = document.getElementById('modalPorts');
    const modalChecklist    = document.getElementById('modalChecklist');
    const copyBtn           = document.getElementById('copyDescriptionBtn');
    const msgContainer      = document.getElementById('messageContainer');
    const resultCount       = document.getElementById('searchResultCount');
    const favFilterBtn      = document.getElementById('favFilterBtn');
    const modalFavBtn       = document.getElementById('modalFavBtn');
    let currentAttack       = null;
    let favOnly             = false;

    // ---- Favorites (persisted in localStorage) ----
    function getFavorites() {
        try { return JSON.parse(localStorage.getItem('favAttacks')) || []; }
        catch { return []; }
    }
    function isFavorite(name) {
        return getFavorites().includes(name);
    }
    function toggleFavorite(name) {
        const favs = getFavorites();
        const idx = favs.indexOf(name);
        if (idx === -1) favs.push(name); else favs.splice(idx, 1);
        localStorage.setItem('favAttacks', JSON.stringify(favs));
        return favs.includes(name);
    }

    function toast(msg) {
        const d = document.createElement('div');
        d.textContent = msg;
        d.style.cssText = 'padding:8px 16px;border-radius:8px;background:#16a34a;color:#fff;margin-bottom:8px;opacity:0;transition:opacity .3s;font-size:.85rem;';
        msgContainer.appendChild(d);
        void d.offsetWidth; d.style.opacity = '1';
        setTimeout(() => { d.style.opacity='0'; d.addEventListener('transitionend',()=>d.remove(),{once:true}); }, 2000);
    }

    function renderCards(searchTerm = '') {
        container.innerHTML = '';
        const term = searchTerm.toLowerCase().trim();
        let total = 0;

        cyberattacksData.forEach(cat => {
            let filtered = term
                ? cat.attacks.filter(a =>
                    a.name.toLowerCase().includes(term) ||
                    a.description.toLowerCase().includes(term) ||
                    cat.category.toLowerCase().includes(term) ||
                    a.severity.toLowerCase().includes(term) ||
                    (a.mitre && a.mitre.toLowerCase().includes(term)) ||
                    (a.ports && a.ports.some(p => p.toLowerCase().includes(term))) ||
                    a.checklist.some(c => c.toLowerCase().includes(term)))
                : cat.attacks;

            if (favOnly) filtered = filtered.filter(a => isFavorite(a.name));

            if (!filtered.length) return;
            total += filtered.length;

            const heading = document.createElement('div');
            heading.className = 'cat-heading';
            heading.innerHTML = `<i class="${cat.icon}"></i>${cat.category}`;
            container.appendChild(heading);

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-3 mb-2';

            filtered.forEach(attack => {
                const card = document.createElement('div');
                card.className = 'attack-card';
                const favClass = isFavorite(attack.name) ? 'favorited' : '';
                card.innerHTML = `<button class="card-fav-btn ${favClass}" title="Toggle favorite"><i class="fas fa-star"></i></button><span class="sev-badge sev-${attack.severity} card-sev-badge">${attack.severity}</span><div class="icon-container"><i class="${attack.icon}" style="color:${attack.color}"></i></div><div class="attack-name">${attack.name}</div>`;
                card.addEventListener('click', () => openModal(attack, cat.category));
                card.querySelector('.card-fav-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const nowFav = toggleFavorite(attack.name);
                    e.currentTarget.classList.toggle('favorited', nowFav);
                    if (favOnly && !nowFav) renderCards(searchInput.value);
                });
                grid.appendChild(card);
            });

            container.appendChild(grid);
        });

        if (!total) {
            container.innerHTML = '<p class="no-results">No attacks found matching your search.</p>';
        }

        if (term) {
            resultCount.style.display = 'block';
            resultCount.textContent = `${total} result${total !== 1 ? 's' : ''} for "${searchTerm}"`;
        } else {
            resultCount.style.display = 'none';
        }
    }

    function openModal(attack, categoryName) {
        currentAttack = { ...attack, categoryName };
        modalIcon.className = attack.icon;
        modalIcon.style.color = attack.color;
        modalName.textContent = attack.name;
        modalCategory.textContent = categoryName;
        modalSeverity.textContent = attack.severity;
        modalSeverity.className = `sev-badge sev-${attack.severity} mt-1`;
        if (attack.mitre && attack.mitre !== 'N/A') {
            modalMitre.style.display = 'inline-flex';
            modalMitre.innerHTML = attack.mitre.split('/').map(id => {
                const clean = id.trim();
                return `<span class="mitre-id-link" data-mitre="${clean}">${clean}</span>`;
            }).join('<span class="mitre-sep"> / </span>');
        } else {
            modalMitre.innerHTML = '';
            modalMitre.style.display = 'none';
        }
        modalDesc.textContent = attack.description;
        modalFavBtn.classList.toggle('favorited', isFavorite(attack.name));

        if (attack.ports && attack.ports.length) {
            modalPorts.innerHTML = attack.ports.map(p => {
                // Extrae el token buscable (ej. "53/UDP" de "53/UDP (DNS amp)")
                const searchValue = p.split(' (')[0].trim();
                return `<span class="port-chip" data-port="${searchValue}">${p}</span>`;
            }).join(' ');
            portsSection.style.display = 'block';
        } else {
            modalPorts.innerHTML = '';
            portsSection.style.display = 'none';
        }

        modalChecklist.innerHTML = attack.checklist
            .map(c => `<li>• ${c}</li>`).join('');

        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy for report';
        copyBtn.classList.remove('copied');
        attackModal.classList.remove('hidden');
        attackModal.scrollTop = 0;
    }

    searchInput.addEventListener('input', e => renderCards(e.target.value));
    closeModalBtn.addEventListener('click', () => attackModal.classList.add('hidden'));

    modalFavBtn.addEventListener('click', () => {
        if (!currentAttack) return;
        const nowFav = toggleFavorite(currentAttack.name);
        modalFavBtn.classList.toggle('favorited', nowFav);
        if (favOnly && !nowFav) renderCards(searchInput.value);
        else renderCards(searchInput.value); // keep card star in sync
    });

    favFilterBtn.addEventListener('click', () => {
        favOnly = !favOnly;
        favFilterBtn.classList.toggle('active', favOnly);
        renderCards(searchInput.value);
    });

    // ============================================================
    // Navegación cross-app: click en un puerto o MITRE ID dentro del
    // modal le pide a SPEED.html que cambie de app y autobusque el valor.
    // Si esta página no está dentro de un iframe de SPEED, el postMessage
    // simplemente no tiene efecto (no rompe nada).
    // ============================================================
    attackModal.addEventListener('click', (e) => {
        const mitreEl = e.target.closest('.mitre-id-link');
        if (mitreEl) {
            window.parent.postMessage({
                action: 'navigate',
                app: 'MITRE ATT&CK®_APP_15_08_25.html',
                type: 'technique',
                value: mitreEl.dataset.mitre
            }, '*');
            return;
        }

        const portEl = e.target.closest('.port-chip');
        if (portEl) {
            window.parent.postMessage({
                action: 'navigate',
                app: 'OSINT.html',
                type: 'port',
                value: portEl.dataset.port
            }, '*');
        }
    });
    window.addEventListener('click', e => { if (e.target === attackModal) attackModal.classList.add('hidden'); });

    copyBtn.addEventListener('click', () => {
        if (!currentAttack) return;
        const checklist = currentAttack.checklist.map((c,i) => `  ${i+1}. ${c}`).join('\n');
        const mitreLine = (currentAttack.mitre && currentAttack.mitre !== 'N/A')
            ? ` — MITRE ATT&CK: ${currentAttack.mitre}`
            : '';
        const portsLine = (currentAttack.ports && currentAttack.ports.length)
            ? `\n\nCOMMON PORTS:\n${currentAttack.ports.join(' • ')}`
            : '';
        const text =
`${currentAttack.name} [${currentAttack.categoryName}] — Severity: ${currentAttack.severity}${mitreLine}

DESCRIPTION:
${currentAttack.description}${portsLine}

LOOK FOR / RULE OUT (T2 TRIAGE):
${checklist}`;

        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            copyBtn.classList.add('copied');
            toast('Copied to clipboard!');
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            copyBtn.classList.add('copied');
            toast('Copied to clipboard!');
        });
    });

    renderCards();
});
</script>
</body>
</html>
