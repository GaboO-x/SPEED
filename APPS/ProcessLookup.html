<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Process Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{
  --primary:#10b233;--linux:#fb923c;
  --danger:#f87171;--warn:#fbbf24;--ok:#4ade80;
  --text:#e5e7eb;--text2:#9ca3af;--bg:#2e343f;--card:#171c23;--border:#2d3748;--border2:#374151;
  --shadow:rgba(0,0,0,0.45);--mono:'JetBrains Mono',monospace;--ui:'Inter',sans-serif;--radius:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui);background:var(--bg);color:var(--text);min-height:100vh;padding:10px;display:flex;flex-direction:column;align-items:center;zoom:1.25}
/* Fallback para navegadores sin soporte de 'zoom' (ej. Firefox) */
@supports not (zoom:1){
  body{transform:scale(1.25);transform-origin:top center;width:80%;margin:0 auto}
}
.app{width:100%;max-width:1080px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px var(--shadow);overflow:hidden}

/* ── Header ── */
.hdr{padding:12px var(--pad,14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:1rem;color:var(--primary);display:flex;align-items:center;gap:8px}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto}

/* ── Path Comparator collapsible ── */
.pc-toggle{width:100%;padding:9px 18px;border:none;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:.78em;font-weight:700;font-family:var(--ui);color:var(--text2);transition:background .15s,color .15s}
.pc-toggle:hover{background:color-mix(in srgb,var(--primary) 5%,var(--bg));color:var(--text)}
.pc-toggle .pc-toggle-left{display:flex;align-items:center;gap:7px}
.pc-toggle .pc-toggle-chevron{font-size:.65em;transition:transform .2s}
.pc-toggle.open .pc-toggle-chevron{transform:rotate(180deg)}
.pc-body{display:none;border-bottom:1px solid var(--border);background:var(--bg)}
.pc-body.open{display:block}
.pc-inner{padding:14px 18px}

/* ── Copy to ticket button ── */
.copy-ticket-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:.72em;font-weight:600;font-family:var(--ui);color:var(--text2);transition:all .18s}
.copy-ticket-btn:hover{border-color:var(--primary);color:var(--primary)}
.copy-ticket-btn.copied{border-color:var(--ok);color:var(--ok)}

/* ── Search ── */
.sbar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-wrap{flex:1;position:relative}
.s-wrap input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border2);border-radius:var(--radius);font-size:.85em;font-family:var(--mono);background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
.s-wrap input:focus{border-color:var(--primary)}
.s-wrap input::placeholder{color:var(--text2);opacity:.7}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.78em}
.mcount{font-size:.72em;color:var(--text2);white-space:nowrap;font-family:var(--mono)}

/* ── Content area ── */
.content{display:grid;grid-template-columns:1fr;transition:all .3s}
.content.split-mode{grid-template-columns:1fr 1px 1fr}
.divider{background:var(--border)}

/* ── Panel ── */
.panel{min-width:0}
.panel-label{padding:10px 18px 6px;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);opacity:.65;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.panel-label .dot{width:8px;height:8px;border-radius:50%}
.panel-body{padding:0}

/* ── Accordion category rows ── */
.cat-row{border-bottom:1px solid var(--border);transition:background .15s}
.cat-row:last-child{border-bottom:none}
.cat-row-head{display:flex;align-items:center;cursor:pointer;padding:0;user-select:none;transition:background .15s;gap:0}
.cat-row-head:hover{background:var(--bg)}
.crh-icon{width:40px;text-align:center;font-size:.95em;padding:10px 0;flex-shrink:0}
.crh-name{width:130px;font-size:.78em;font-weight:700;padding:10px 10px;flex-shrink:0;border-right:1px solid var(--border)}
.crh-summary{flex:1;font-size:.72em;padding:10px 12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
.crh-count{font-size:.65em;color:var(--text2);padding:0 8px;flex-shrink:0;font-family:var(--mono)}
.crh-chevron{font-size:.6em;padding:0 12px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.cat-row.open .crh-chevron{transform:rotate(180deg)}

/* per-category color var */
.cr-core    {--cc:#0078D4} .cr-servicios{--cc:#5C2D91} .cr-seguridad{--cc:#107C10}
.cr-red     {--cc:#0099BC} .cr-ui       {--cc:#D13438} .cr-runtime  {--cc:#6B69D6}
.cr-sospecho{--cc:#A4262C} .cr-init     {--cc:#E95420} .cr-kernel   {--cc:#424242}
.cr-svc     {--cc:#8B2EBE} .cr-lnet     {--cc:#0077C8} .cr-lsec     {--cc:#2E7D32}
.cr-shell   {--cc:#6D4C41} .cr-tools    {--cc:#D84315} .cr-malware  {--cc:#B71C1C}
.cr-3p      {--cc:#6B69D6} .cr-cloud    {--cc:#0099BC} .cr-office   {--cc:#D13438}
.cr-edr     {--cc:#107C10}

.crh-icon{color:var(--cc)}
.crh-name{color:var(--cc)}
.cat-row.open{background:color-mix(in srgb,var(--cc) 3%,transparent)}
.cat-row.open .crh-name{font-weight:800}

/* ── Proc chips inside accordion ── */
.chips-wrap{display:none;padding:7px 10px 10px 40px;flex-wrap:wrap;gap:5px;border-top:1px solid var(--border);background:var(--bg)}
.cat-row.open .chips-wrap{display:flex}
.pchip{font-size:.7em;font-family:var(--mono);padding:3px 10px;border-radius:999px;border:1px solid var(--border2);color:var(--text2);background:var(--card);cursor:pointer;white-space:nowrap;transition:all .15s}
.pchip:hover{transform:translateY(-1px);border-color:var(--cc);color:var(--cc)}
.pchip.sel{background:color-mix(in srgb,var(--cc) 15%,transparent);border-color:color-mix(in srgb,var(--cc) 50%,transparent);color:var(--cc);font-weight:700}
/* risk dot on chips */
.pchip::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0}
.pchip.r-system::before{background:var(--primary)}
.pchip.r-low::before{background:var(--ok)}
.pchip.r-medium::before{background:#ca7800}
.pchip.r-high::before{background:#ca5100}
.pchip.r-critical::before{background:var(--danger)}

/* ── Inline info box ── */
.inline-info{display:none;margin:0 10px 10px 40px;padding:10px 13px;border-radius:6px;border:1px solid var(--border2);border-left:4px solid var(--cc);background:var(--card)}
.inline-info.show{display:block}
.ii-name{font-family:var(--mono);font-size:.82em;font-weight:700;color:var(--cc);margin-bottom:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ii-badge{font-size:.68em;padding:2px 8px;border-radius:999px;background:color-mix(in srgb,var(--cc) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc) 40%,transparent)}
.ii-desc{font-size:.82em;line-height:1.55;color:var(--text2)}

/* ── Search results view ── */
.results-view{padding:8px;display:none}
.results-view.show{display:block}
.pcard{border:1px solid var(--border);border-left:4px solid transparent;border-radius:var(--radius);padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:background .15s,transform .12s;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.pcard:hover{background:var(--bg);transform:translateX(2px)}
.pcard.risk-system  {border-left-color:var(--primary)}
.pcard.risk-low     {border-left-color:var(--ok)}
.pcard.risk-medium  {border-left-color:#ca7800}
.pcard.risk-high    {border-left-color:#ca5100}
.pcard.risk-critical{border-left-color:var(--danger)}
.pcard.lnx.risk-system{border-left-color:var(--linux)}
.ct{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pname{font-family:var(--mono);font-size:.8em;font-weight:700}
.rpill{font-size:.66em;padding:1px 7px;border-radius:999px;border:1px solid;margin-left:auto;font-weight:700;white-space:nowrap}
.rp-system  {color:var(--primary);border-color:var(--primary);background:rgba(0,120,212,.08)}
.rp-low     {color:var(--ok);border-color:var(--ok);background:rgba(16,124,16,.08)}
.rp-medium  {color:#ca7800;border-color:#ca7800;background:rgba(202,120,0,.08)}
.rp-high    {color:#ca5100;border-color:#ca5100;background:rgba(202,81,0,.08)}
.rp-critical{color:var(--danger);border-color:var(--danger);background:rgba(209,52,56,.08)}
.os-pip{font-size:.6em;padding:1px 6px;border-radius:999px;font-weight:700}
.op-w{background:rgba(0,120,212,.1);color:var(--primary);border:1px solid rgba(0,120,212,.25)}
.op-l{background:rgba(233,84,32,.1);color:var(--linux);border:1px solid rgba(233,84,32,.25)}
.pdesc{font-size:.75em;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pcat-tag{font-size:.67em;color:var(--text2);margin-top:2px;opacity:.7}
mark{background:rgba(255,210,0,.38);border-radius:2px;color:inherit}
.no-results{padding:40px 20px;text-align:center;color:var(--text2);font-size:.85em}
.no-results i{font-size:1.5em;opacity:.2;display:block;margin-bottom:8px}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px var(--shadow)}
.mh{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--card);z-index:1}
.mn{font-family:var(--mono);font-size:.92em;font-weight:700;flex:1}
.mosbadge{font-size:.68em;padding:2px 9px;border-radius:999px;font-weight:700}
.mow{background:rgba(0,120,212,.1);color:var(--primary);border:1px solid rgba(0,120,212,.28)}
.mol{background:rgba(233,84,32,.1);color:var(--linux);border:1px solid rgba(233,84,32,.28)}
.mcl{width:26px;height:26px;border:1px solid var(--border2);border-radius:6px;background:transparent;cursor:pointer;color:var(--text2);font-size:.85em;display:flex;align-items:center;justify-content:center}
.mcl:hover{background:var(--bg)}
.mb{padding:13px 15px}
.mfull{font-size:.78em;color:var(--text2);margin-bottom:9px}
.mdesc{font-size:.86em;line-height:1.65;margin-bottom:12px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mf label{font-size:.66em;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);display:block;margin-bottom:2px;opacity:.7}
.mf span{font-size:.78em;font-family:var(--mono);color:var(--text)}
.msec{background:var(--bg);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px}
.msr{margin-bottom:8px}
.msr:last-child{margin-bottom:0}
.msl{font-size:.66em;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);opacity:.65;margin-bottom:3px}
.msv{font-size:.8em;color:var(--text2);line-height:1.55}
.mtag{display:inline-block;font-family:var(--mono);font-size:.78em;padding:1px 7px;border-radius:4px;background:rgba(255,100,100,.1);border:1px solid rgba(255,100,100,.22);color:#ff9090}

/* ── Parent-child tree in modal ── */
.tree-section{background:var(--bg);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px}
.tree-title{font-size:.66em;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);opacity:.65;margin-bottom:8px}
.tree-wrap{font-family:var(--mono);font-size:.75em;line-height:1.8}
.tree-node{display:flex;align-items:center;gap:6px}
.tree-node.level-0{color:var(--text2);margin-bottom:2px}
.tree-node.level-1{padding-left:20px;color:var(--text);font-weight:700}
.tree-node.level-1::before{content:"└─";margin-right:4px;color:var(--text2);opacity:.5}
.tree-node.level-2{padding-left:44px;color:var(--text2)}
.tree-node.level-2::before{content:"└─";margin-right:4px;color:var(--text2);opacity:.4}
.tree-badge{font-size:.65em;padding:1px 5px;border-radius:3px;background:var(--card);border:1px solid var(--border2);color:var(--text2)}
.tree-badge.self{background:color-mix(in srgb,var(--primary) 12%,transparent);border-color:color-mix(in srgb,var(--primary) 40%,transparent);color:var(--primary)}
.tree-badge.self.linux{background:color-mix(in srgb,var(--linux) 12%,transparent);border-color:color-mix(in srgb,var(--linux) 40%,transparent);color:var(--linux)}
.tree-badge.warn{background:rgba(209,52,56,.08);border-color:rgba(209,52,56,.3);color:var(--danger)}

/* ── Path Comparator ── */
.path-panel{padding:20px}
.path-panel h3{font-size:.9em;font-weight:700;margin-bottom:4px;color:var(--text)}
.path-panel p{font-size:.78em;color:var(--text2);margin-bottom:16px;line-height:1.5}
.path-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.path-field label{font-size:.68em;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);display:block;margin-bottom:5px;opacity:.7}
.path-field input,.path-field select{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:.82em;font-family:var(--mono);background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
.path-field input:focus,.path-field select:focus{border-color:var(--primary)}
.path-btn{display:flex;gap:8px;margin-bottom:16px}
.btn{padding:7px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:.8em;font-weight:600;font-family:var(--ui);transition:all .18s}
.btn-primary{background:#1d395f;color:#fff}
.btn-primary:hover{background:#12243e}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.path-result{border-radius:var(--radius);padding:14px 16px;border:1.5px solid var(--border2);display:none;animation:fi .2s ease}
.path-result.show{display:block}
.path-result.ok{border-color:var(--ok);background:rgba(16,124,16,.05)}
.path-result.warn{border-color:#ca7800;background:rgba(202,120,0,.05)}
.path-result.danger{border-color:var(--danger);background:rgba(209,52,56,.06)}
.path-result.unknown{border-color:var(--border2);background:var(--bg)}
.pr-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pr-icon{font-size:1.1em}
.pr-title{font-weight:700;font-size:.88em}
.pr-ok{color:var(--ok)} .pr-warn{color:#ca7800} .pr-danger{color:var(--danger)} .pr-unknown{color:var(--text2)}
.pr-body{font-size:.8em;color:var(--text2);line-height:1.6}
.pr-body strong{color:var(--text);font-family:var(--mono)}
.pr-diff{margin-top:8px;padding:8px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border2)}
.pr-diff-row{display:flex;gap:8px;font-size:.75em;font-family:var(--mono);margin-bottom:3px;align-items:flex-start}
.pr-diff-row:last-child{margin-bottom:0}
.pr-label{color:var(--text2);min-width:60px;flex-shrink:0;font-family:var(--ui);font-size:.85em;padding-top:1px}
.pr-val-ok{color:var(--ok)} .pr-val-warn{color:var(--danger)}
.path-history{margin-top:14px}
.ph-title{font-size:.68em;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);opacity:.65;margin-bottom:6px}
.ph-item{font-size:.75em;font-family:var(--mono);padding:5px 8px;border-radius:5px;border:1px solid var(--border);margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.ph-item:hover{background:var(--bg)}
.ph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ph-dot-ok{background:var(--ok)} .ph-dot-warn{background:#ca7800} .ph-dot-danger{background:var(--danger)} .ph-dot-unknown{background:var(--text2)}

@media(max-width:640px){
  .content.split-mode{grid-template-columns:1fr}
  .divider{display:none}
  .crh-name{width:100px}
  .path-inputs{grid-template-columns:1fr}
}
</style>
<script>
document.documentElement.setAttribute('data-theme','dark');
</script>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <div class="htitle">
      <i class="fas fa-microchip"></i>
      Process Lookup
    </div>
  </div>

  <!-- Search bar -->
  <div class="sbar">
    <div class="s-wrap">
      <i class="fas fa-search si"></i>
      <input id="q" type="text" placeholder="Search any process (Windows &amp; Linux): lsass, sshd, chrome, kubectl, xmrig..." autocomplete="off" spellcheck="false">
    </div>
    <div class="mcount" id="mc"></div>
  </div>

  <!-- Path Comparator — collapsible -->
  <button class="pc-toggle" id="pc-toggle-btn" onclick="toggleComparator()">
    <span class="pc-toggle-left"><i class="fas fa-folder-open"></i> Path Comparator</span>
    <i class="fas fa-chevron-down pc-toggle-chevron"></i>
  </button>
  <div class="pc-body" id="pc-body">
    <div class="pc-inner">
      <div class="path-inputs">
        <div class="path-field">
          <label>Operating System</label>
          <select id="pc-os"></select>
        </div>
        <div class="path-field">
          <label>Auto-detected process</label>
          <div id="pc-detected" style="padding:8px 10px;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:.82em;font-family:var(--mono);background:var(--bg);color:var(--text2);min-height:36px">— type a path below —</div>
        </div>
      </div>
      <div class="path-inputs" style="grid-template-columns:1fr">
        <div class="path-field">
          <label>Observed path (from EDR / SIEM / ps output)</label>
          <input id="pc-path" type="text" placeholder="e.g. C:\Users\bob\AppData\Local\svchost.exe  or  /tmp/kworker" spellcheck="false" oninput="autoDetectProc()">
        </div>
      </div>
      <div class="path-btn">
        <button class="btn btn-primary" onclick="comparePath()"><i class="fas fa-bolt"></i> &nbsp;Analyze</button>
        <button class="btn btn-ghost" onclick="clearPath()">Clear</button>
      </div>
      <div class="path-result" id="pc-result"></div>
      <div class="path-history" id="pc-history" style="display:none">
        <div class="ph-title">Session history</div>
        <div id="ph-list"></div>
      </div>
    </div>
  </div>

  <!-- Process panels -->
  <div class="content split-mode" id="content">
    <!-- Windows Panel -->
    <div class="panel" id="panel-w">
      <div class="panel-label"><span class="dot" style="background:#0078D4"></span> Windows — <span id="cnt-w">0</span> processes</div>
      <div class="panel-body" id="body-w"></div>
      <div class="results-view" id="res-w"></div>
    </div>
    <div class="divider" id="div-mid"></div>
    <!-- Linux Panel -->
    <div class="panel" id="panel-l">
      <div class="panel-label"><span class="dot" style="background:#E95420"></span> Linux — <span id="cnt-l">0</span> processes</div>
      <div class="panel-body" id="body-l"></div>
      <div class="results-view" id="res-l"></div>
    </div>
  </div>
</div><!-- /.app -->

<!-- Modal -->
<div class="overlay" id="ov">
  <div class="modal">
    <div class="mh">
      <span class="mn" id="mn"></span>
      <span class="rpill" id="mr"></span>
      <span class="mosbadge" id="mosb"></span>
      <button class="copy-ticket-btn" id="copy-btn" onclick="copyToTicket()" title="Copy to ticket">
        <i class="fas fa-copy"></i> Copy to Ticket
      </button>
      <button class="mcl" onclick="cm()"><i class="fas fa-times"></i></button>
    </div>
    <div class="mb">
      <div class="mfull" id="mf"></div>
      <div class="mdesc" id="md"></div>
      <div class="mgrid">
        <div class="mf"><label>Legitimate path</label><span id="mp"></span></div>
        <div class="mf"><label>Killable?</label><span id="mk"></span></div>
        <div class="mf"><label>Category</label><span id="mcat"></span></div>
        <div class="mf"><label>Impersonation risk</label><span id="mi"></span></div>
        <div class="mf" id="meu-row"><label>Expected user</label><span id="meu" style="color:var(--ok);font-weight:600"></span></div>
        <div class="mf" id="mil-row"><label>Integrity level</label><span id="mil"></span></div>
      </div>
      <!-- Parent-child tree -->

// ═══════════════════════════════════════════════
// ACCORDION BUILD
// ═══════════════════════════════════════════════
function buildAccordion(cats,db,bodyId,os){
  const body=document.getElementById(bodyId);
  body.innerHTML='';
  cats.forEach(cat=>{
    const procs=cat.procs.filter(p=>db[p]);
    if(!procs.length)return;
    const summary=procs.map(p=>db[p].n).join(', ');
    const row=document.createElement('div');
    row.className=`cat-row ${cat.cls}`;
    row.id=`cr-${cat.id}`;
    row.innerHTML=`
      <div class="cat-row-head" onclick="toggleCat('${cat.id}','${os}')">
        <div class="crh-icon">${cat.icon}</div>
        <div class="crh-name">${cat.label}</div>
        <div class="crh-summary">${summary}</div>
        <div class="crh-count">${procs.length}</div>
        <div class="crh-chevron"><i class="fas fa-chevron-up"></i></div>
      </div>
      <div class="chips-wrap" id="chips-${cat.id}">
        ${procs.map(p=>`<span class="pchip r-${db[p].r}" id="chip-${cat.id}-${p.replace(/[^a-z0-9]/gi,'_')}" onclick="selectProc('${cat.id}','${p}','${os}')">${db[p].n}</span>`).join('')}
      </div>
      <div class="inline-info ${cat.cls}" id="ii-${cat.id}">
        <div class="ii-name" id="ii-name-${cat.id}"></div>
        <div class="ii-desc" id="ii-desc-${cat.id}"></div>
      </div>`;
    body.appendChild(row);
  });
  updateCounts(db,os);
}

function toggleCat(catId,os){
  const row=document.getElementById(`cr-${catId}`);
  if(!row)return;
  const isOpen=row.classList.contains('open');
  row.classList.toggle('open',!isOpen);
  openCats[catId]=!isOpen;
  if(isOpen && selProc[catId]){
    const db=os==='w'?W:L;
    clearSel(catId,db,os);
  }
}

function selectProc(catId,proc,os){
  om(proc,os);
}

function clearSel(catId,db,os){
  if(selProc[catId]){
    const safeP=selProc[catId].replace(/[^a-z0-9]/gi,'_');
    const old=document.getElementById(`chip-${catId}-${safeP}`);
    if(old)old.classList.remove('sel');
  }
  selProc[catId]=null;
  const iiBox=document.getElementById(`ii-${catId}`);
  if(iiBox)iiBox.classList.remove('show');
}

function updateCounts(db,os){
  const cid=os==='w'?'cnt-w':'cnt-l';
  document.getElementById(cid).textContent=Object.keys(db).length;
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
function hl(t,q){
  if(!q)return t;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return t.replace(re,'<mark>$1</mark>');
}

function renderResults(db,resId,bodyId,cntId,q,os){
  const res=document.getElementById(resId);
  const body=document.getElementById(bodyId);
  const cnt=document.getElementById(cntId);
  if(!q){ res.className='results-view'; body.style.display=''; return; }
  const matches=Object.values(db).filter(p=>(p.n+p.fn+p.d+p.cat).toLowerCase().includes(q));
  body.style.display='none';
  res.className='results-view show';
  cnt.textContent=matches.length+' result'+(matches.length!==1?'s':'');
  if(!matches.length){
    res.innerHTML=`<div class="no-results"><i class="fas fa-search"></i>No results for "${q}"</div>`;
    return;
  }
  res.innerHTML=matches.map(p=>`
    <div class="pcard risk-${p.r} ${os}" onclick="om('${p.n}','${os}')">
      <div class="ct">
        <span class="pname">${hl(p.n,q)}</span>
        <span class="rpill rp-${p.r}">${RT[p.r]||p.r}</span>
      </div>
      <div class="pdesc">${hl(p.d,q)}</div>
      <div class="pcat-tag">${p.cat}</div>
    </div>`).join('');
}

function doSearch(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  renderResults(W,'res-w','body-w','cnt-w',q,'w');
  renderResults(L,'res-l','body-l','cnt-l',q,'l');
  if(q){
    const tw=Object.values(W).filter(p=>(p.n+p.fn+p.d).toLowerCase().includes(q)).length;
    const tl=Object.values(L).filter(p=>(p.n+p.fn+p.d).toLowerCase().includes(q)).length;
    document.getElementById('mc').textContent=(tw+tl)+' result'+(tw+tl!==1?'s':'')+' across both OS';
  } else {
    document.getElementById('mc').textContent='';
  }
}

function buildTreeHTML(d,os){
  if(!d.tree) return '';
  const t=d.tree;
  const selfCls=os==='l'?'self linux':'self';
  let html=`<div class="tree-node level-0"><i class="fas fa-arrow-up" style="font-size:.7em;margin-right:4px"></i>${t.parent}</div>`;
  html+=`<div class="tree-node level-1"><span class="tree-badge ${selfCls}">${d.n}</span> &nbsp;<span style="font-size:.8em;color:var(--text2)">(this process)</span></div>`;
  if(t.children&&t.children.length){
    t.children.forEach(c=>{
      const isSusp=c.toLowerCase().includes('suspicious');
      html+=`<div class="tree-node level-2"><span class="tree-badge${isSusp?' warn':''}">${c}</span></div>`;
    });
  }
  return html;
}

function om(name,os){
  const db=os==='w'?W:L;
  const d=db[name]||Object.values(db).find(p=>p.n===name);
  if(!d)return;
  currentModalData={d,os};

  document.getElementById('mn').textContent=d.n;
  const rp=document.getElementById('mr'); rp.textContent=RT[d.r]||d.r; rp.className='rpill rp-'+d.r;
  const ob=document.getElementById('mosb'); ob.textContent=os==='w'?'🪟 Windows':'🐧 Linux'; ob.className='mosbadge '+(os==='w'?'mow':'mol');
  document.getElementById('mf').textContent=d.fn;
  document.getElementById('md').textContent=d.d;
  document.getElementById('mp').textContent=d.path;
  document.getElementById('mk').textContent=KT[String(d.k)]||'—';
  document.getElementById('mcat').textContent=d.cat;
  document.getElementById('mi').textContent=d.s.i;
  // Expected user / integrity level
  const euEl=document.getElementById('meu'); const ilEl=document.getElementById('mil');
  if(d.eu){ euEl.textContent=d.eu; document.getElementById('meu-row').style.display=''; }
  else { document.getElementById('meu-row').style.display='none'; }
  if(d.il){ ilEl.textContent=d.il; document.getElementById('mil-row').style.display=''; }
  else { document.getElementById('mil-row').style.display='none'; }
  document.getElementById('mev').textContent=d.s.r;
  document.getElementById('mal').textContent=d.s.a;
  const mt=d.s.m;
  if(mt&&mt!=='—'){document.getElementById('mit').innerHTML=`<span class="mtag">${mt}</span>`;document.getElementById('mtr').style.display='block';}
  else document.getElementById('mtr').style.display='none';

  // Tree
  const treeSection=document.getElementById('modal-tree-section');
  if(d.tree){
    document.getElementById('modal-tree-visual').innerHTML=buildTreeHTML(d,os);
    document.getElementById('modal-tree-warn').textContent=d.tree.warn?'⚠️ '+d.tree.warn:'';
    document.getElementById('modal-tree-cmd').textContent=d.tree.cmd||'';
    treeSection.style.display='block';
  } else {
    treeSection.style.display='none';
  }

  // Reset copy button
  const cb=document.getElementById('copy-btn');
  cb.classList.remove('copied');
  cb.innerHTML='<i class="fas fa-copy"></i> Copy to Ticket';

  document.getElementById('ov').classList.add('open');
}

function cm(){document.getElementById('ov').classList.remove('open');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)cm();});

// COPY TO TICKET
// ═══════════════════════════════════════════════
function copyToTicket(){
  if(!currentModalData)return;
  const {d,os}=currentModalData;
  const osLabel=os==='w'?'Windows':'Linux';
  const riskLabel=RT[d.r]||d.r;
  const now=new Date();
  const ts=now.toISOString().replace('T',' ').substring(0,19)+' UTC';

  let text='';
  text+=`--> ${d.n} PROCESS DESCRIPTION:\n`;
  text+=`${d.d}\n\n`;
  text+=`Legitimate Path : ${d.path}\n`;
  text+=`Category        : ${d.cat}\n`;
  if(d.eu) text+=`Expected User   : ${d.eu}\n`;
  text+=`Killable?       : ${KT[String(d.k)]||'—'}\n`;
  text+=`Risk Assessment : ${d.s.r}\n`;
  if(d.s.m&&d.s.m!=='—') text+=`MITRE ATT&CK    : ${d.s.m}\n`;
  text+='\n';

  if(d.tree){
    text+='EXPECTED PROCESS TREE:\n';
    text+=`  Parent:   ${d.tree.parent}\n`;
    text+=`  Process:  ${d.n}\n`;
    if(d.tree.children&&d.tree.children.length){
      d.tree.children.forEach(c=>{ text+=`    └─ ${c}\n`; });
    }
  }

  navigator.clipboard.writeText(text).then(()=>{
    const cb=document.getElementById('copy-btn');
    cb.classList.add('copied');
    cb.innerHTML='<i class="fas fa-check"></i> Copied!';
    setTimeout(()=>{ cb.classList.remove('copied'); cb.innerHTML='<i class="fas fa-copy"></i> Copy to Ticket'; },2500);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const cb=document.getElementById('copy-btn');
    cb.classList.add('copied');
    cb.innerHTML='<i class="fas fa-check"></i> Copied!';
    setTimeout(()=>{ cb.classList.remove('copied'); cb.innerHTML='<i class="fas fa-copy"></i> Copy to Ticket'; },2500);
  });
}

// ═══════════════════════════════════════════════
// PATH COMPARATOR
// ═══════════════════════════════════════════════
function extractExeName(path){
  // Extract filename from full path (handles both / and \)
  const clean=path.trim().replace(/['"]/g,'');
  const parts=clean.split(/[/\\]/);
  let exe=parts[parts.length-1].toLowerCase();
  // Strip args after space (e.g. "svchost.exe -k netsvcs")
  exe=exe.split(/\s/)[0];
  return exe;
}

function findProcInDB(exeName,os){
  const db=os==='w'?W:L;
  // 1. Direct key match
  if(db[exeName]) return db[exeName];
  // 2. Case-insensitive name match
  const found=Object.values(db).find(p=>p.n.toLowerCase()===exeName);
  if(found) return found;
  // 3. Partial match (e.g. "MsMpEng.exe" → key "msmpeng.exe")
  return Object.values(db).find(p=>p.n.toLowerCase()===exeName||p.n.toLowerCase().replace('.exe','')===exeName.replace('.exe',''));
}

function autoDetectProc(){
  const path=document.getElementById('pc-path').value.trim();
  const os=document.getElementById('pc-os').value;
  const det=document.getElementById('pc-detected');
  if(!path){ det.textContent='— type a path below —'; det.style.color='var(--text2)'; return; }
  const exe=extractExeName(path);
  const d=findProcInDB(exe,os);
  if(d){
    det.innerHTML=`<span style="color:var(--text);font-weight:700">${d.n}</span> <span style="color:var(--text2);font-size:.85em">— ${d.fn}</span>`;
  } else {
    det.innerHTML=`<span style="color:#ca7800">${exe}</span> <span style="color:var(--text2);font-size:.85em">— not in database</span>`;
  }
}

document.getElementById('pc-os').addEventListener('change', autoDetectProc);

// Resolve common Windows environment variable patterns before comparing
function resolveEnvVars(p){
  return p
    .replace(/%SystemRoot%/gi,       'C:/Windows')
    .replace(/%WINDIR%/gi,           'C:/Windows')
    .replace(/%SystemDrive%/gi,      'C:')
    .replace(/%ProgramFiles%/gi,     'C:/Program Files')
    .replace(/%ProgramFiles\(x86\)%/gi,'C:/Program Files (x86)')
    .replace(/%ProgramW6432%/gi,     'C:/Program Files')
    .replace(/%CommonProgramFiles%/gi,'C:/Program Files/Common Files')
    .replace(/%APPDATA%/gi,          'C:/Users/[user]/AppData/Roaming')
    .replace(/%LOCALAPPDATA%/gi,     'C:/Users/[user]/AppData/Local')
    .replace(/%TEMP%/gi,             'C:/Users/[user]/AppData/Local/Temp')
    .replace(/%TMP%/gi,              'C:/Users/[user]/AppData/Local/Temp')
    .replace(/%USERPROFILE%/gi,      'C:/Users/[user]')
    .replace(/%PUBLIC%/gi,           'C:/Users/Public')
    .replace(/%ALLUSERSPROFILE%/gi,  'C:/ProgramData');
}
function normalizePath(p){ return resolveEnvVars(p.trim()).toLowerCase().replace(/\\/g,'/').replace(/\/+/g,'/'); }

function comparePath(){
  const os=document.getElementById('pc-os').value;
  const observed=document.getElementById('pc-path').value.trim();
  if(!observed){ alert('Please enter the observed path.'); return; }

  const exe=extractExeName(observed);
  const d=findProcInDB(exe,os);
  const res=document.getElementById('pc-result');
  res.classList.add('show');

  if(!d){
    res.className='path-result show unknown';
    res.innerHTML=`<div class="pr-header"><span class="pr-icon">❓</span><span class="pr-title pr-unknown">Process not in database: <code>${exe}</code></span></div>
    <div class="pr-body">No reference data found for <strong>${exe}</strong>. Treat as unknown and investigate the binary — check hash against VirusTotal and verify digital signature.</div>`;
    addHistory('unknown',exe,observed); return;
  }

  const legitPath=d.path;
  const normObs=normalizePath(observed);
  const normLegit=normalizePath(legitPath);

  if(legitPath==='No legitimate path'){
    res.className='path-result show danger';
    res.innerHTML=`<div class="pr-header"><span class="pr-icon">🔴</span><span class="pr-title pr-danger">CRITICAL — No legitimate path exists</span></div>
    <div class="pr-body"><strong>${d.n}</strong> has <strong>no legitimate path</strong>. Any running instance = malware.<br><br>${d.s.r}<br><br><strong>Action:</strong> ${d.s.a}</div>`;
    addHistory('danger',d.n,observed); return;
  }

  if(normLegit.includes('*')){
    const parts=normLegit.split('*');
    const startOk=normObs.startsWith(parts[0]);
    const endOk=parts[1]?normObs.endsWith(parts[1]):true;
    if(startOk&&endOk){ renderOk(res,d,observed,legitPath); addHistory('ok',d.n,observed); }
    else { renderDanger(res,d,observed,legitPath,'Path pattern mismatch'); addHistory('danger',d.n,observed); }
    return;
  }

  if(normObs===normLegit){
    renderOk(res,d,observed,legitPath); addHistory('ok',d.n,observed);
  } else {
    const suspPatterns=['temp','tmp','appdata','desktop','downloads','public','recycle','users\\public'];
    const isSusp=suspPatterns.some(p=>normObs.includes(p));
    const isSimilar=levenshtein(normObs,normLegit)<(normLegit.length*0.3);
    if(isSusp){ renderDanger(res,d,observed,legitPath,'Path is in a suspicious/writable location'); addHistory('danger',d.n,observed); }
    else if(isSimilar){ renderWarn(res,d,observed,legitPath,'Similar but not identical — possible typosquatting or masquerading'); addHistory('warn',d.n,observed); }
    else { renderDanger(res,d,observed,legitPath,'Path does not match legitimate location'); addHistory('danger',d.n,observed); }
  }
}

function renderOk(res,d,observed,legit){
  res.className='path-result show ok';
  res.innerHTML=`<div class="pr-header"><span class="pr-icon">✅</span><span class="pr-title pr-ok">Path matches — Legitimate location</span></div>
  <div class="pr-body">Observed path matches the expected location for <strong>${d.n}</strong>.
  <div class="pr-diff"><div class="pr-diff-row"><span class="pr-label">Expected</span><span class="pr-val-ok">${legit}</span></div>
  <div class="pr-diff-row"><span class="pr-label">Observed</span><span class="pr-val-ok">${observed}</span></div></div>
  ℹ️ Impersonation risk: <strong>${d.s.i}</strong>. ${d.s.a}</div>`;
}

function renderWarn(res,d,observed,legit,reason){
  res.className='path-result show warn';
  res.innerHTML=`<div class="pr-header"><span class="pr-icon">⚠️</span><span class="pr-title pr-warn">Suspicious — ${reason}</span></div>
  <div class="pr-body"><div class="pr-diff">
  <div class="pr-diff-row"><span class="pr-label">Expected</span><span class="pr-val-ok">${legit}</span></div>
  <div class="pr-diff-row"><span class="pr-label">Observed</span><span class="pr-val-warn">${observed}</span></div></div>
  MITRE: <strong>${d.s.m||'—'}</strong> &nbsp;|&nbsp; ${d.s.a}</div>`;
}

function renderDanger(res,d,observed,legit,reason){
  res.className='path-result show danger';
  res.innerHTML=`<div class="pr-header"><span class="pr-icon">🔴</span><span class="pr-title pr-danger">HIGH RISK — ${reason}</span></div>
  <div class="pr-body"><div class="pr-diff">
  <div class="pr-diff-row"><span class="pr-label">Expected</span><span class="pr-val-ok">${legit}</span></div>
  <div class="pr-diff-row"><span class="pr-label">Observed</span><span class="pr-val-warn">${observed}</span></div></div>
  Risk: <strong>${d.s.r}</strong><br>MITRE: <strong>${d.s.m||'—'}</strong><br><strong>Action:</strong> ${d.s.a}</div>`;
}

function clearPath(){
  document.getElementById('pc-path').value='';
  document.getElementById('pc-result').className='path-result';
  document.getElementById('pc-result').innerHTML='';
}

function addHistory(status,name,path){
  pathHistory.unshift({status,name,path,time:new Date().toLocaleTimeString()});
  if(pathHistory.length>10) pathHistory.pop();
  renderHistory();
}

function renderHistory(){
  const hist=document.getElementById('pc-history');
  const list=document.getElementById('ph-list');
  if(!pathHistory.length){hist.style.display='none';return;}
  hist.style.display='block';
  list.innerHTML=pathHistory.map((h,i)=>`
    <div class="ph-item" onclick="replayHistory(${i})">
      <span class="ph-dot ph-dot-${h.status}"></span>
      <span style="color:var(--text2);font-family:var(--ui);font-size:.7em;min-width:42px">${h.time}</span>
      <span style="font-weight:700;color:var(--text)">${h.name}</span>
      <span style="color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.path}</span>
    </div>`).join('');
}

function replayHistory(i){
  const h=pathHistory[i];
  ['w','l'].forEach(os=>{
    const db=os==='w'?W:L;
    if(db[h.name]||Object.values(db).find(p=>p.n===h.name)){
      document.getElementById('pc-os').value=os;
      populatePathSelect();
    }
  });
  document.getElementById('pc-path').value=h.path;
  comparePath();
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
