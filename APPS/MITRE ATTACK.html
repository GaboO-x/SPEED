    <!-- Google Font: Inter -->

    <style>
        /* ===== THEME (from Template_v2 / Speed) ===== */
        :root {
            --primary-color:#8fb6ff;
            --secondary-color:#9aa0a6;
            --text-color:#049601;
            --bg-color-main:#0f1115;
            --card-bg:#151a21;
            --border-color:#2a3340;
            --shadow-color:rgba(0, 0, 0, 0.55);

            --button-blue-dark: #0A2647;
            --button-blue-dark-hover: #071A2E;

            --header-bg:#0b1220;
            --header-input-bg:#111827;
            --header-input-text:#ffffff;
            --header-input-placeholder:#9aa0a6;

            --scrollbar-track:#0f1115;
            --scrollbar-thumb:#2a3340;
            --scrollbar-thumb-hover:#3a4658;
        }
        /* ===== END THEME ===== */

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color-main);
            color: var(--text-color);
        }

        /* Tailwind utility overrides to make theme apply without changing markup */
        .bg-white { background-color: var(--card-bg) !important; }
        .text-gray-800 { color: var(--text-color) !important; }
        /* Fix: ensure technique titles are visible */
        .technique-title {
            color: #ffffff !important;
        }
        .text-gray-700 { color: var(--secondary-color) !important; }
        .text-gray-500 { color: var(--secondary-color) !important; }
        .text-gray-400 { color: var(--secondary-color) !important; }

        .bg-gray-800 { background-color: var(--header-bg) !important; }
        .bg-gray-700 { background-color: var(--header-input-bg) !important; }
        .placeholder-gray-400::placeholder { color: var(--header-input-placeholder) !important; }

        .bg-blue-600 { background-color: var(--primary-color) !important; }
        .hover\:bg-blue-700:hover { background-color: var(--button-blue-dark-hover) !important; }

        /* Barra de desplazamiento personalizada para mejor estética */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* Rotar la flecha para indicar que un elemento está expandido */
        .rotate-180 {
            transform: rotate(180deg);
        }
        /* Clase para el icono de flecha rojo oscuro y más grande */
        .red-arrow {
            color: #b91c1c; /* Tailwind red-700 */
        }
    
        /* FIX: Search input text color visible (green) */
        #searchInput {
            color: #22c55e !important; /* Tailwind green-500 */
        }

        .desc-collapsed { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .desc-expanded { display: block; overflow: visible; }
        .expand-btn { font-size: 0.7rem; color: #b91c1c; cursor: pointer; background: none; border: none; padding: 0; margin-top: 2px; }
        .expand-btn:hover { text-decoration: underline; }
</style>
</head>

                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>

            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 grid grid-cols-1 md:grid-cols-4 gap-4">

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Tactics</h2>
            <div id="filterContainer" class="space-y-3">

            </div>
        </aside>

        <section class="md:col-span-3 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-800"></h2>
            <div id="techniquesContainer" class="grid grid-cols-1 gap-4">
                <!-- Las tarjetas de técnicas se generarán aquí dinámicamente -->
            </div>
        </section>
    </main>

// Función para animar el botón de copiado
function animateCopyButton(button) {
    // Guardar las clases originales que vamos a reemplazar
    const originalBgClass = 'bg-[#1A2434]';
    const originalHoverClass = 'hover:bg-blue-600';

    // Clases para el estado de "copiado"
    const copiedBgClass = 'bg-green-600';
    const copiedHoverClass = 'hover:bg-green-700';

    // Cambiar las clases para mostrar el estado de copiado
    button.classList.remove(originalBgClass, originalHoverClass);
    button.classList.add(copiedBgClass, copiedHoverClass);

    // Restaurar las clases originales después de 0.25 segundo
    setTimeout(() => {
        button.classList.remove(copiedBgClass, copiedHoverClass);
        button.classList.add(originalBgClass, originalHoverClass);
    }, 250);
}

// ============================================================
// Puente de navegación cross-app (postMessage) enviado a SPEED.html
// Reusado por los 4 botones de copy (tactic-copy-btn, copy-all-btn,
// copy-technique-btn, copy-summary-btn). Mismo type que OSINT
// ('osint-data') para que Template_MDR/L2 lo inserten en el mismo
// campo (## Artifacts / OSINT Summary), respetando lo que ya haya.
// ============================================================
function sendToTemplates(text) {
    try {
        window.parent.postMessage({
            action: 'navigate',
            app: 'Launcher_Templates.html',
            type: 'osint-data',
            value: text
        }, '*');
    } catch (err) {
        console.warn('[MITRE] No se pudo enviar postMessage a SPEED:', err);
    }
}

// Función para animar el botón de copiado del resumen
function animateSummaryButton(button) {
    // Guardar las clases originales que vamos a reemplazar
    const originalBgClass = 'bg-[#1A2434]';
    const originalHoverClass = 'hover:bg-blue-600';

    // Clases para el estado de "copiado"
    const copiedBgClass = 'bg-green-600';
    const copiedHoverClass = 'hover:bg-green-700';

    // Cambiar las clases para mostrar el estado de copiado
    button.classList.remove(originalBgClass, originalHoverClass);
    button.classList.add(copiedBgClass, copiedHoverClass);

    // Restaurar las clases originales después de 0.25 segundo
    setTimeout(() => {
        button.classList.remove(copiedBgClass, copiedHoverClass);
        button.classList.add(originalBgClass, originalHoverClass);
    }, 250);
}

        // Función para renderizar los filtros
        function renderFilters() {
            filterContainer.innerHTML = '';
            // Renderizar las casillas de verificación principales (Enterprise, Mobile, ICS)
            for (const matrixKey in mitreData) {
                const matrix = mitreData[matrixKey];
                const matrixDiv = document.createElement('div');
                matrixDiv.className = 'space-y-1';
                matrixDiv.innerHTML = `
                    <label class="flex items-center font-bold text-gray-800">
                        <input type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded-md main-category-checkbox" value="${matrixKey}" ${activeFilters.matrix === matrixKey ? 'checked' : ''}>
 <span class="ml-2">${matrix.name} (${matrix.tactics.length})</span>
                    </label>
                    <div id="tactics-${matrixKey}" class="ml-6 space-y-1 ${activeFilters.matrix === matrixKey ? '' : 'hidden'}">
                        <!-- Las tácticas se insertarán aquí -->
                    </div>
                `;
                filterContainer.appendChild(matrixDiv);

                const tacticsDiv = document.getElementById(`tactics-${matrixKey}`);
                matrix.tactics.forEach(tactic => {
                    const tacticLabel = document.createElement('label');
                    tacticLabel.className = 'flex items-center text-gray-700';
                    tacticLabel.innerHTML = `
                        <input type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded-md tactic-checkbox" value="${tactic.name}" ${activeFilters.tactics.includes(tactic.name) ? 'checked' : ''}>
                        <span class=\"ml-2\">${tactic.name} (${tactic.techniques.length})</span>
                    `;
                    tacticsDiv.appendChild(tacticLabel);
                });
            }
        }

        // Función para renderizar técnicas y sub-técnicas
function renderTechniques() {
            techniquesContainer.innerHTML = '';

            const rawInput = searchInput.value.trim();
            const searchTerms = rawInput.length > 0
                ? rawInput.split(/[\s,]+/).map(t => t.toLowerCase()).filter(t => t.length > 0)
                : [];
            const searchTerm = searchTerms.join(' ');
            let techniquesToRender = [];
            let matchInfoById = {};
            
            if (searchTerms.length > 0) {
                const seen = new Set();
                const allTechniques = [];
                for (const matrixKey in mitreData) {
                    mitreData[matrixKey].tactics.forEach(tactic => {
                        // Check if search matches the tactic itself (e.g. TA0043)
                        const tacticMatch = searchTerms.some(term =>
                            tactic.id.toLowerCase().includes(term) ||
                            tactic.name.toLowerCase().includes(term) ||
                            (tactic.description && tactic.description.toLowerCase().includes(term))
                        );
                        tactic.techniques.forEach(technique => {
                            if (seen.has(technique.id)) return;
                            // ¿La técnica padre coincide directamente (o coincide la táctica)?
                            const parentMatches = tacticMatch || searchTerms.some(term =>
                                technique.id.toLowerCase().includes(term) ||
                                technique.name.toLowerCase().includes(term) ||
                                technique.description.toLowerCase().includes(term)
                            );
                            // ¿Qué sub-técnicas específicas coinciden?
                            const matchedSubIds = (technique.sub_techniques || [])
                                .filter(sub => searchTerms.some(term =>
                                    sub.id.toLowerCase().includes(term) ||
                                    sub.name.toLowerCase().includes(term) ||
                                    sub.description.toLowerCase().includes(term)
                                ))
                                .map(sub => sub.id);
                            const hasMatch = parentMatches || matchedSubIds.length > 0;
                            if (hasMatch) {
                                seen.add(technique.id);
                                allTechniques.push(technique);
                                matchInfoById[technique.id] = { parentMatches, matchedSubIds };
                            }
                        });
                    });
                }
                const section = techniquesContainer.closest('section');
                const h2 = section ? section.querySelector('h2') : null;
                if (h2) h2.textContent = '';

                // If search matched a tactic directly, show tactic summary card(s) first
                const matchedTactics = [];
                for (const matrixKey in mitreData) {
                    mitreData[matrixKey].tactics.forEach(tactic => {
                        const isTacticMatch = searchTerms.some(term =>
                            tactic.id.toLowerCase().includes(term) ||
                            tactic.name.toLowerCase().includes(term) ||
                            (tactic.description && tactic.description.toLowerCase().includes(term))
                        );
                        if (isTacticMatch) matchedTactics.push(tactic);
                    });
                }
                matchedTactics.forEach(tactic => {
                    const tacticCard = document.createElement('div');
                    tacticCard.className = 'bg-blue-100 border-l-4 border-bg-[#1A2434] text-gray-800 p-4 rounded-lg shadow-md mb-2 relative';
                    tacticCard.innerHTML = `
                        <h4 class="text-xl font-bold mb-2">${tactic.id} - ${tactic.name}</h4>
                        <p class="text-sm">${tactic.description}</p>
                        <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-200">
                            <a href="${tactic.url}" target="_blank" class="text-red-700 hover:underline text-sm inline-block">MORE</a>
                            <button class="tactic-copy-btn bg-[#1A2434] text-white px-2 py-1 rounded-md hover:bg-blue-600 transition duration-300 text-xs">Copy</button>
                        </div>
                    `;
                    const copyBtn = tacticCard.querySelector('.tactic-copy-btn');
                    copyBtn.addEventListener('click', () => {
                        const txt = `ID: ${tactic.id} : Name: ${tactic.name}\nDescription: ${tactic.description}\nURL: ${tactic.url}`;
                        const ta = document.createElement('textarea');
                        ta.value = txt;
                        document.body.appendChild(ta);
                        ta.select();
                        try {
                            document.execCommand('copy');
                            copyBtn.textContent = '✓ Copied!';
                            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
                        } catch(e) {}
                        document.body.removeChild(ta);
                        sendToTemplates(txt);
                    });
                    techniquesContainer.appendChild(tacticCard);
                });

                // Cuenta el total de elementos realmente encontrados (técnica padre solo si
                // ella coincidió directamente, más cada sub-técnica que coincidió puntualmente).
                const totalMatchCount = allTechniques.reduce((acc, t) => {
                    const info = matchInfoById[t.id];
                    return acc + (info.parentMatches ? 1 : 0) + info.matchedSubIds.length;
                }, 0);

                if (allTechniques.length > 0) {
                    const banner = document.createElement('div');
                    banner.id = 'search-banner';
                    banner.className = 'flex items-center justify-between bg-gray-100 border border-gray-300 rounded-lg px-4 py-2 mb-2';
                    banner.innerHTML = `
                        <span class="text-sm font-semibold text-gray-700">
                            🔍 ${allTechniques.length} technique(s) found for: <span class="text-red-700">${searchTerms.join(', ')}</span>
                        </span>
                        ${totalMatchCount > 1 ? `
                        <button id="copy-all-btn" class="bg-[#1A2434] text-white px-3 py-1 rounded-lg text-xs hover:bg-blue-600 transition duration-300 flex items-center shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                            </svg>
                            Copy All
                        </button>` : ''}
                    `;
                    techniquesContainer.appendChild(banner);
                    const copyAllBtn = banner.querySelector('#copy-all-btn');
                    if (copyAllBtn) {
                        copyAllBtn.addEventListener('click', () => {
                            const blocks = [];
                            allTechniques.forEach(t => {
                                const info = matchInfoById[t.id];
                                // Solo incluir la técnica padre si ELLA fue parte de la búsqueda.
                                if (info.parentMatches) {
                                    const cleanName = t.name.replace(/\s*\(\d+\)\s*$/, '');
                                    blocks.push(`ID: ${t.id} : Name: ${cleanName}\n  Description: ${t.description}`);
                                }
                                if (t.sub_techniques) {
                                    t.sub_techniques.forEach(sub => {
                                        if (info.matchedSubIds.includes(sub.id)) {
                                            blocks.push(`ID: ${sub.id} : Name: ${sub.name}\n  Description: ${sub.description}`);
                                        }
                                    });
                                }
                            });
                            const content = blocks.join('\n\n');
                            const textarea = document.createElement('textarea');
                            textarea.value = content;
                            document.body.appendChild(textarea);
                            textarea.select();
                            try {
                                document.execCommand('copy');
                                copyAllBtn.textContent = '✓ Copied!';
                                copyAllBtn.classList.remove('bg-[#1A2434]');
                                copyAllBtn.classList.add('bg-green-600');
                                setTimeout(() => {
                                    copyAllBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" /><path d="M6 3a2 2 0 002 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" /></svg> Copy All`;
                                    copyAllBtn.classList.remove('bg-green-600');
                                    copyAllBtn.classList.add('bg-[#1A2434]');
                                }, 1500);
                            } catch (err) { console.error(err); }
                            document.body.removeChild(textarea);
                            sendToTemplates(content);
                        });
                    }
                }
                techniquesToRender = allTechniques;
            } else {
                const section = techniquesContainer.closest('section');
                const h2 = section ? section.querySelector('h2') : null;
                if (h2) h2.textContent = '';
                // Si no hay término de búsqueda, aplica la lógica de filtros existente.
                if (!activeFilters.matrix) {
                    techniquesContainer.innerHTML = '<p class="text-gray-500">Select a matrix.</p>';
                    return;
                }
                if (activeFilters.tactics.length === 0) {
                    techniquesContainer.innerHTML = '<p class="text-gray-500">Select a Tactic to see its techniques.</p>';
                    return;
                }

                const matrix = mitreData[activeFilters.matrix];
                const selectedTacticName = activeFilters.tactics[0];
                const selectedTactic = matrix.tactics.find(t => t.name === selectedTacticName);

                // Agregar el resumen de la táctica al inicio con el botón de copiar
if (selectedTactic && selectedTactic.description) {
    const summaryCard = document.createElement('div');
    summaryCard.className = 'bg-blue-100 border-l-4 border-bg-[#1A2434] text-gray-800 p-4 rounded-lg shadow-md mb-4 relative';
    summaryCard.innerHTML = `
        <h4 class="text-xl font-bold mb-2">${selectedTactic.id} - ${selectedTactic.name} Summary</h4>
        <p class="text-sm">${selectedTactic.description}</p>
        <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-200">
            <a href="${selectedTactic.url}" target="_blank" class="text-red-700 hover:underline text-sm inline-block">MORE</a>
            <button id="copy-summary-btn" class="bg-[#1A2434] text-white px-2 py-1 rounded-md hover:bg-blue-600 transition duration-300 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                </svg>
                Copy
            </button>
        </div>
    `;
    techniquesContainer.appendChild(summaryCard);
}

                // AÑADIR LA LÓGICA DE ORDENACIÓN AQUÍ
                if (selectedTactic) {
                    const sortedTechniques = [...selectedTactic.techniques].sort((a, b) => {
                        return a.id.localeCompare(b.id, undefined, { numeric: true, sensitivity: 'base' });
                    });
                    techniquesToRender = sortedTechniques;
                }
            }

            // Renderizar las técnicas ordenadas
            if (techniquesToRender.length > 0) {
                techniquesToRender.forEach(technique => {
                    const techniqueCard = createTechniqueCard(technique, matchInfoById[technique.id] || null);
                    techniquesContainer.appendChild(techniqueCard);
                });
                checkExpandBtns();
            } else if (searchTerms.length > 0) {
                techniquesContainer.innerHTML = '<p class="text-gray-500">No techniques found matching: ' + searchTerms.join(', ') + '</p>';
            }
        }

        // Función para crear una tarjeta de técnica principal
        // matchInfo (opcional): { parentMatches: bool, matchedSubIds: string[] } — se usa durante
        // una búsqueda para mostrar SOLO las sub-técnicas que realmente coincidieron con lo buscado,
        // en vez de todas las sub-técnicas de la técnica padre.
        function createTechniqueCard(technique, matchInfo = null) {
            const hasSubTechniques = technique.sub_techniques && technique.sub_techniques.length > 0;

            // ¿Estamos en un caso de búsqueda donde el padre NO coincidió directamente,
            // sino solo alguna(s) de sus sub-técnicas? En ese caso, filtramos.
            const isPartialSubMatch = !!matchInfo && !matchInfo.parentMatches && matchInfo.matchedSubIds.length > 0;

            const subsToShow = isPartialSubMatch
                ? technique.sub_techniques.filter(sub => matchInfo.matchedSubIds.includes(sub.id))
                : (technique.sub_techniques || []);

            // Si es coincidencia parcial, se fuerza a mostrar expandido (solo lo encontrado)
            // y se deshabilita el toggle manual, ya que no tendría sentido colapsar/expandir
            // un subconjunto filtrado por búsqueda.
            const canToggle = hasSubTechniques && !isPartialSubMatch;
            const isExpanded = isPartialSubMatch || expandedTechniques.has(technique.id);

            const card = document.createElement('div');
            card.className = `bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition duration-300 relative`;
            card.setAttribute('data-id', technique.id); // Identificador para la tarjeta principal

            card.innerHTML = `
                <div class="flex items-start justify-between mb-2">
                    <div>
                        <div class="flex items-center" onclick="${canToggle ? `toggleSubTechniques('${technique.id}')` : ''}">
                            <h3 class="text-lg font-medium text-gray-900 technique-title">${technique.id} - ${technique.name}${subsToShow.length > 0 ? ' (' + subsToShow.length + ')' : ''}</h3>
                            ${canToggle ? `<svg class="w-5 h-5 ml-2 transition-transform duration-300 red-arrow ${isExpanded ? 'rotate-180' : ''} cursor-pointer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>` : ''}
                        </div>
                        <p class="text-sm text-gray-700 desc-collapsed technique-description-text mt-2">${technique.description}</p>
                        <button class="expand-btn" onclick="toggleDesc(this)">▼ show more</button>
                    </div>
                </div>
                    <div class="mt-4 pt-4 border-t border-gray-200 flex items-center justify-between">
                    <a href="${technique.url}" target="_blank" class="text-red-700 hover:underline text-sm inline-block">MORE</a>
 <button class="copy-technique-btn bg-[#1A2434] text-white px-2 py-1 rounded-lg text-xs hover:bg-blue-600 transition duration-300 flex items-center shadow-md">
 <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" viewBox="0 0 20 20" fill="white">
                            <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                            <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                        </svg>
                        Copy
                    </button>
                </div>
                <div id="sub-techniques-${technique.id}" class="mt-4 pt-4 border-t border-gray-200 space-y-2 ${isExpanded ? '' : 'hidden'}">
                    <!-- Las sub-técnicas se insertarán dinámicamente aquí -->
                </div>
            `;

            // Renderizar sub-técnicas si están expandidas (solo las que corresponden mostrar)
            if (isExpanded && subsToShow.length > 0) {
                const subTechniquesContainer = card.querySelector(`#sub-techniques-${technique.id}`);
                subsToShow.forEach(sub => {
                    const subCard = createSubTechniqueCard(sub);
                    subTechniquesContainer.appendChild(subCard);
                });
            }

            return card;
        }

        // Función para crear una tarjeta de sub-técnica
        function createSubTechniqueCard(subTechnique) {
    const card = document.createElement('div');
    // Agrega el atributo data-sub-id para identificar la sub-técnica.
    card.className = 'bg-gray-50 p-3 rounded-lg border border-gray-100 flex items-end justify-between hover:bg-gray-100 transition duration-200';
    card.setAttribute('data-sub-id', subTechnique.id); // <--- Línea agregada
    card.innerHTML = `
        <div>
            <h4 class="text-sm font-semibold text-gray-800">${subTechnique.id} - ${subTechnique.name}</h4>
            <p class="text-xs text-gray-600 mt-1 desc-collapsed">${subTechnique.description}</p>
            <button class="expand-btn" onclick="toggleDesc(this)">▼ show more</button>
        </div>
        <div class="flex items-center space-x-2 mt-auto">
            <a href="${subTechnique.url}" target="_blank" class="text-red-700 hover:underline text-xs inline-block">MORE</a>
            <button class="copy-technique-btn bg-[#1A2434] text-white px-2 py-1 rounded-lg text-xs hover:bg-blue-600 transition duration-300 shadow-sm flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                </svg>
                Copy
            </button>
        </div>
    `;
    return card;
}

        // Función para abrir el modal de confirmación.
        function openModal(message) {
            modalMessage.textContent = message;
            copyModal.classList.remove('hidden');
        }

        // Función para cerrar el modal.
        function closeModal() {
            copyModal.classList.add('hidden');
        }

        // Función para alternar la visibilidad de las sub-técnicas
        function toggleSubTechniques(techniqueId) {
            // Verificar si la técnica ya está expandida
            const isExpanded = expandedTechniques.has(techniqueId);
            
            // Limpiar el conjunto de técnicas expandidas para asegurarse de que solo una esté abierta
            expandedTechniques.clear();

            // Si la técnica no estaba expandida, añadirla al conjunto para abrirla
            if (!isExpanded) {
                expandedTechniques.add(techniqueId);
            }

            // Volver a renderizar las técnicas para aplicar el cambio
            renderTechniques();
        }

        // Event listener para cambios en los filtros
        filterContainer.addEventListener('change', (event) => {
            const target = event.target;
            if (target.classList.contains('main-category-checkbox')) {
                const matrixKey = target.value;
                if (target.checked) {
                    activeFilters.matrix = matrixKey;
                    // Auto-seleccionar la primera táctica para mostrar información inmediatamente
                    const firstTactic = (mitreData[matrixKey] && mitreData[matrixKey].tactics && mitreData[matrixKey].tactics[0]) ? mitreData[matrixKey].tactics[0].name : null;
                    activeFilters.tactics = firstTactic ? [firstTactic] : [];
                    expandedTechniques.clear();
                } else {
                    activeFilters.matrix = null;
                }
                // Deseleccionar otras casillas principales para asegurar que solo una esté activa
                document.querySelectorAll('.main-category-checkbox').forEach(cb => {
                    if (cb.value !== matrixKey) {
                        cb.checked = false;
                    }
                });
            } else if (target.classList.contains('tactic-checkbox')) {
                const tacticName = target.value;
                if (target.checked) {
                    // Deseleccionar todas las demás tácticas antes de seleccionar la nueva
                    document.querySelectorAll('.tactic-checkbox').forEach(cb => {
                        if (cb.value !== tacticName) {
                            cb.checked = false;
                        }
                    });
                    activeFilters.tactics = [tacticName];
                } else {
                    activeFilters.tactics = [];
                }
            }
            // Después de cualquier cambio en los filtros, volver a renderizar
            renderFilters();
            renderTechniques();
        });

        // Event listener para el botón de copiado.
        techniquesContainer.addEventListener('click', (event) => {
    const button = event.target.closest('.copy-technique-btn');
    if (button) {
        let id, name, description;

        // Buscar el contenedor de la sub-técnica (la tarjeta más cercana con el atributo 'data-sub-id').
        const parentSubCard = button.closest('[data-sub-id]');

        if (parentSubCard) {
            // Si existe un contenedor de sub-técnica, extraer la información de este.
            id = parentSubCard.getAttribute('data-sub-id');
            name = parentSubCard.querySelector('h4').textContent.split(' - ')[1].trim();
            description = parentSubCard.querySelector('p').textContent;
        } else {
            // Si no, buscar el contenedor de la técnica principal.
            const parentCard = button.closest('[data-id]');
            if (parentCard) {
                id = parentCard.getAttribute('data-id');
                name = parentCard.querySelector('h3').textContent.split(' - ')[1].trim().replace(/\s*\(\d+\)\s*$/, '');
                description = parentCard.querySelector('.technique-description-text').textContent;
            }
        }

        if (id && name && description) {
            const content = `ID: ${id} : Name: ${name}\nDescription: ${description}`;

            const textarea = document.createElement('textarea');
            textarea.value = content;
            document.body.appendChild(textarea);
            textarea.select();
            try {
    document.execCommand('copy');
        // Llama a la nueva función de animación en caso de éxito
    animateCopyButton(button);
} catch (err) {
    // Manejo de errores sin un pop-up visual, puedes ver el error en la consola
    console.error('Error al copiar el texto:', err);
}
            document.body.removeChild(textarea);
            sendToTemplates(content);
        }
    }
});

        // Event listener para la entrada de búsqueda
        searchInput.addEventListener('input', renderTechniques);

        // ============================================================
        // Puente de navegación cross-app (postMessage) recibido desde SPEED.html
        // Cuando otra app (ej. Cybersecurity Dictionary) manda un MITRE
        // technique ID, lo cargamos en el buscador y renderizamos directo.
        // ============================================================
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || data.type !== 'technique' || !data.value) return;

            searchInput.value = data.value;
            renderTechniques();

            const container = document.getElementById('techniquesContainer');
            if (container && container.scrollIntoView) {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });

        function toggleDesc(btn) {
            const p = btn.previousElementSibling;
            if (p.classList.contains('desc-collapsed')) {
                p.classList.remove('desc-collapsed');
                p.classList.add('desc-expanded');
                btn.textContent = '▲ show less';
            } else {
                p.classList.remove('desc-expanded');
                p.classList.add('desc-collapsed');
                btn.textContent = '▼ show more';
            }
        }

        function checkExpandBtns() {
            requestAnimationFrame(() => {
                document.querySelectorAll('.expand-btn').forEach(btn => {
                    const p = btn.previousElementSibling;
                    if (!p) return;
                    btn.style.display = p.scrollHeight > p.clientHeight + 2 ? '' : 'none';
                });
            });
        }

        // Configuración inicial al cargar la página
        window.onload = function() {
            renderFilters();
            renderTechniques();
        };

    </script>
</body>
</html>
