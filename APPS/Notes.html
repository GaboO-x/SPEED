<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    :root {
        --bg-page:#171c23; --text:#e5e7eb; --container-bg:#171c23;
        --card-bg:#151a21; --card-border:#fddf0057;
        --heading:#e5e7eb; --heading-2:#cbd5e1;
        --input-bg:#151a21; --input-border:#756f15;
        --modal-overlay:rgba(0,0,0,0.70); --modal-bg:#18181b;
        --muted:#94a3b8; --badge-bg:#1e293b; --badge-text:#94a3b8;
        --accent:#1d395f; --accent-hover:#12243e;
        --danger:#7f1d1d; --danger-hover:#5f1616;
    }
    * { box-sizing:border-box; }
    body {
        font-family:"Inter",sans-serif; background-color:var(--bg-page); color:var(--text);
        padding:20px; margin:0; display:flex; flex-direction:column; align-items:center; min-height:100vh;
    }
    .container { background-color:var(--container-bg); padding:30px; border-radius:12px; width:100%; max-width:1200px; }
    h1 { text-align:center; color:var(--heading); margin-bottom:4px; font-size:2rem; font-weight:700; }
    .subtitle { text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:18px; }

    .toolbar { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
    #searchInput {
        background-color:var(--input-bg); color:var(--text); border:1px solid var(--input-border);
        width:100%; max-width:220px; padding:8px 12px; border-radius:10px; font-size:.85rem;
    }
    #searchInput::placeholder { color:var(--muted); }
    #searchInput:focus { outline:none; box-shadow:0 0 0 2px var(--input-border); }

    #addBtn, #linkBtn {
        width:34px; height:34px; border-radius:8px; font-size:.85rem; cursor:pointer; flex-shrink:0;
        border:1px solid var(--card-border); background:var(--badge-bg); color:var(--muted);
        transition:background .2s, color .2s, border-color .2s;
    }
    #addBtn:hover, #linkBtn:hover { color:var(--text); background:#273449; }
    #linkBtn.linked { background:#14532d33; color:#86efac; border-color:#16a34a; }
    #linkBtn.linked:hover { background:#14532d55; }
    #linkBtn.pending { background:#78350f33; color:#fbbf24; border-color:#b45309; }
    #linkBtn.pending:hover { background:#78350f55; }

    .link-status { text-align:center; font-size:.72rem; color:var(--muted); margin-bottom:24px; }
    .link-status button {
        background:none; border:none; color:#93c5fd; cursor:pointer; font-size:.72rem; text-decoration:underline; padding:0;
    }
    .link-status .linked { color:#86efac; }

    #resultCount { text-align:center; color:var(--muted); font-size:.8rem; margin-bottom:16px; }

    #cardsContainer {
        display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:14px;
    }
    .note-card {
        background-color:var(--card-bg); border:1px solid var(--card-border); border-radius:.75rem;
        padding:1rem; cursor:pointer; transition:transform .15s, box-shadow .15s, opacity .15s; position:relative;
        display:flex; flex-direction:column; gap:6px; min-height:100px;
    }
    .note-card:hover { transform:translateY(-3px); box-shadow:0 8px 18px rgba(0,0,0,.35); }
    .note-card.dragging { opacity:.35; }
    .note-card.drag-over { outline:1px dashed var(--input-border); outline-offset:2px; }
    .card-drag-handle {
        position:absolute; top:6px; right:8px; color:var(--muted); opacity:.35; font-size:.8rem;
        cursor:grab; padding:4px 6px; line-height:1; transition:opacity .15s;
    }
    .card-drag-handle:hover { opacity:.85; }
    .card-drag-handle:active { cursor:grabbing; }
    .note-card .note-icon { font-size:1.3rem; color:var(--muted); }
    .note-card .note-title { font-weight:700; font-size:.92rem; color:var(--heading); line-height:1.3; }
    .note-card .note-preview { font-size:.78rem; color:var(--muted); line-height:1.4;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .note-card .note-tag {
        align-self:flex-start; font-size:.62rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
        padding:2px 8px; border-radius:999px; background:var(--badge-bg); color:var(--badge-text); margin-top:auto;
    }

    .no-results { text-align:center; color:var(--muted); padding:40px 0; font-size:1rem; grid-column:1/-1; }

    /* Modales */
    .modal-overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
        background-color:var(--modal-overlay); z-index:50; padding:16px; }
    .modal-overlay.hidden { display:none; }
    .modal-overlay > div { background-color:var(--modal-bg); color:var(--text); border-radius:14px; padding:28px;
        max-width:640px; width:100%; max-height:105vh; overflow-y:auto; position:relative; }
    .modal-close { position:absolute; top:14px; right:16px; font-size:1.6rem; line-height:1; color:var(--muted);
        background:none; border:none; cursor:pointer; }
    .modal-close:hover { color:var(--text); }
    #modalTag { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    #modalContent { font-size:.88rem; line-height:1.65; color:var(--text); white-space:pre-wrap; }
    #modalContent a { color:#60a5fa; text-decoration:underline; word-break:break-all; }
    #modalContent a:hover { color:#93c5fd; }

    .modal-actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .btn {
        color:#fff; padding:8px 18px; border-radius:8px; border:none; cursor:pointer;
        display:flex; align-items:center; gap:6px; font-size:.85rem; font-weight:600;
        transition:background .2s;
    }
    .btn-accent { background:var(--accent); }
    .btn-accent:hover { background:var(--accent-hover); }
    .btn-accent.copied { background:#16a34a; }
    .btn-danger { background:var(--danger); }
    .btn-danger:hover { background:var(--danger-hover); }
    .btn-ghost { background:var(--badge-bg); color:var(--text); }
    .btn-ghost:hover { background:#273449; }

    /* ===== Forma tipo "Associate/Closing Notes" para el modal de vista ===== */
    #formModal > div { max-width:1100px; max-height:95vh; }
    #viewModal > div { max-width:1100px; text-align:center; }
    #viewModal .modal-close { display:none; } /* se reemplaza por el botón "Close" de abajo */
    #viewModal #modalTitleRow { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:14px; }
    #viewModal #modalIcon { font-size:1.05rem; color:var(--heading); }
    #viewModal #modalTitle { font-size:1.15rem; font-weight:700; color:var(--heading); margin:0; padding-right:0; }
    #viewModal #modalTag {
        display:inline-block; margin:0 0 10px 0; padding:2px 10px; border-radius:999px;
        background:var(--badge-bg); color:var(--badge-text); font-size:.65rem;
    }
    #viewModal #modalContentBox {
        border:1px solid var(--card-border); border-radius:10px; padding:16px;
        text-align:left; min-height:160px; max-height:78vh; overflow-y:auto;
        background-color:var(--input-bg);
    }
    #viewModal .modal-actions {
        gap:8px; margin-top:16px; align-items:center; flex-wrap:nowrap; justify-content:flex-start;
    }
    #viewModal .modal-spacer { flex:1; }
    #viewModal .modal-char-counter { font-size:.72rem; color:var(--muted); white-space:nowrap; }
    #viewModal .btn-icon {
        background:var(--badge-bg); color:var(--text); border:1px solid var(--card-border);
        padding:8px 16px; border-radius:20px; font-size:.78rem; font-weight:600;
    }
    #viewModal .btn-icon:hover { background:#273449; }
    #viewModal .btn-icon.copied { color:#86efac; border-color:#16a34a; }
    #viewModal .btn-icon.danger { background:var(--danger); color:#fff; border-color:var(--danger); }
    #viewModal .btn-icon.danger:hover { background:var(--danger-hover); }
    #viewModal .btn-icon.close-pill { background:var(--danger); color:#fff; border-color:var(--danger); }
    #viewModal .btn-icon.close-pill:hover { background:var(--danger-hover); }

    /* Formulario add/edit */
    .form-field { margin-bottom:14px; }
    .form-field label { display:block; font-size:.75rem; color:var(--muted); text-transform:uppercase;
        letter-spacing:.04em; margin-bottom:6px; }
    .form-field input, .form-field textarea {
        width:100%; background-color:var(--input-bg); color:var(--text); border:1px solid var(--card-border);
        border-radius:8px; padding:10px 12px; font-size:.88rem; font-family:inherit;
    }
    .form-field input:focus, .form-field textarea:focus { outline:none; border-color:var(--input-border); }
    .form-field textarea { min-height:340px; resize:vertical; white-space:pre-wrap; }
    .form-hint { font-size:.7rem; color:var(--muted); margin-top:4px; }

    .editor-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
    .editor-btn {
        background-color:var(--input-bg); color:var(--text); border:1px solid var(--card-border);
        border-radius:6px; padding:6px 11px; font-size:.78rem; font-family:inherit; cursor:pointer;
        transition:background .15s, border-color .15s;
    }
    .editor-btn:hover { background:#273449; }
    .editor-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .editor-sep { width:1px; align-self:stretch; background:var(--card-border); margin:0 2px; }
    .rich-editor {
        width:100%; min-height:340px; max-height:60vh; overflow-y:auto; resize:vertical;
        background-color:var(--input-bg); color:var(--text); border:1px solid var(--card-border);
        border-radius:8px; padding:10px 12px; font-size:.88rem; line-height:1.55; font-family:inherit;
    }
    .rich-editor:focus { outline:none; border-color:var(--input-border); }
    .rich-editor:empty:before { content:attr(data-placeholder); color:var(--muted); }
    .rich-editor font[size="5"], #modalContent font[size="5"] { font-size:1.3em; line-height:1.4; }
    .rich-editor font[size="3"], #modalContent font[size="3"] { font-size:inherit; }

    #toastContainer { position:fixed; bottom:16px; right:16px; z-index:60; }
    .toast { background:var(--card-bg); border:1px solid var(--card-border); color:var(--text); padding:10px 16px;
        border-radius:8px; font-size:.82rem; margin-top:8px; transition:opacity .3s; }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#0b1220; border-radius:10px; }
    ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:10px; }

    @media(max-width:768px) { h1 { font-size:1.5rem; } .container { padding:16px; } }
</style>
</head>
<body>
<div class="container">
    <h1>Notes</h1>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Buscar por título, tag o contenido...">
        <button id="linkBtn" title="Vincular archivo"><i class="fas fa-link"></i></button>
        <button id="addBtn" title="Agregar nota"><i class="fas fa-plus"></i></button>
    </div>
    <div class="link-status" id="linkStatus"></div>

    <div id="resultCount" style="display:none;"></div>
    <div id="cardsContainer"></div>
</div>

<!-- Modal de vista -->
<div id="viewModal" class="modal-overlay hidden">
    <div>
        <button class="modal-close" data-close="viewModal">&times;</button>
        <div id="modalTitleRow">
            <i id="modalIcon" class="fas"></i>
            <h2 id="modalTitle"></h2>
        </div>
        <div id="modalTag"></div>
        <div id="modalContentBox">
            <div id="modalContent"></div>
        </div>
        <div class="modal-actions">
            <button id="copyBtn" class="btn btn-icon"><i class="fas fa-copy"></i> Copy</button>
            <span class="modal-spacer"></span>
            <span class="modal-char-counter" id="viewCharCounter">0 chars</span>
            <button id="editBtn" class="btn btn-icon"><i class="fas fa-pen"></i></button>
            <button id="deleteBtn" class="btn btn-icon danger"><i class="fas fa-trash"></i></button>
            <button class="btn btn-icon close-pill" data-close="viewModal"><i class="fas fa-times"></i> Close</button>
        </div>
    </div>
</div>

<!-- Modal de agregar/editar -->
<div id="formModal" class="modal-overlay hidden">
    <div>
        <button class="modal-close" data-close="formModal">&times;</button>
        <h2 id="formTitleHeading">Nueva nota</h2>
        <div class="form-field">
            <label>Título *</label>
            <input type="text" id="formTitle" placeholder="Ej: Query KQL para logon fallidos">
        </div>
        <div class="form-field">
            <label>Icono (Font Awesome, opcional)</label>
            <input type="text" id="formIcon" placeholder="Ej: fas fa-terminal">
            <div class="form-hint">Busca clases en fontawesome.com/icons. Déjalo vacío si no quieres icono.</div>
        </div>
        <div class="form-field">
            <label>Tag (opcional)</label>
            <input type="text" id="formTag" placeholder="Ej: KQL, Triage, MITRE">
        </div>
        <div class="form-field">
            <label>Contenido *</label>
            <div class="editor-toolbar">
                <button type="button" class="editor-btn" id="btnBold" title="Negrita"><b>N</b></button>
                <button type="button" class="editor-btn" id="btnHighlight" title="Resaltar selección">Resaltar</button>
                <button type="button" class="editor-btn" id="btnUnhighlight" title="Quitar resaltado">Quitar resaltado</button>
                <span class="editor-sep"></span>
                <button type="button" class="editor-btn active" id="btnSizeNormal" title="Tamaño normal">A</button>
                <button type="button" class="editor-btn" id="btnSizeBig" title="Tamaño grande">A+</button>
            </div>
            <div id="formContent" class="rich-editor" contenteditable="true" data-placeholder="Escribe la nota completa aquí..."></div>
        </div>
        <div class="form-field" style="margin-top:-8px;">
            <span class="form-hint">Seleccioná texto y aplicá negrita, resaltado o tamaño desde la barra de arriba.</span>
        </div>
        <div class="modal-actions">
            <button id="saveBtn" class="btn btn-accent"><i class="fas fa-floppy-disk"></i> Guardar</button>
            <button class="btn btn-ghost" data-close="formModal">Cancelar</button>
        </div>
    </div>
</div>

<div id="toastContainer"></div>

<script>
/*
  ==========================================================================
  Puedes seguir editando notas a mano aquí abajo si prefieres, o usar el
  botón "+" de la interfaz (requiere vincular este mismo archivo, ver más
  abajo la sección de guardado).

  Cada nota es un objeto con:
    - title:   texto del título (obligatorio)
    - icon:    clase de Font Awesome, ej "fas fa-shield-halved" (opcional)
    - tag:     etiqueta corta, ej "QRadar", "KQL", "MITRE" (opcional)
    - content: el texto completo de la nota. Usa \n para saltos de línea.
  ==========================================================================
*/
/* ===NOTES_DATA_START=== */

    },

        "richText": true
    },
    {
        "title": "Comandos Crowdstrike",
        "icon": "fa-duotone fa-solid fa-chess",
        "tag": "Crowdstrike",
        "content": "<span style=\"background-color: rgb(145, 0, 22);\">** Filtrado (lo más usado día a día)</span><br><br>field=value → filtro exacto (case sensitive por default)<br>field=*value* → wildcard<br>field!=value → negación<br>field IN (val1, val2, val3) → filtro múltiple<br>\"texto libre\" → búsqueda de texto plano sin especificar campo<br><br><span style=\"background-color: rgb(145, 0, 22);\">** Proyección de campos</span><br><br>table(field1, field2, field3) → muestra SOLO ESOS campos<br>select(field1, field2) → similar a table pero se usa más en pipelines intermedios<br>rename(campoViejo, as=campoNuevo)<br><br><span style=\"background-color: rgb(145, 0, 22);\">** Agregación (clave para detección de patrones/FP)</span><br><br>groupBy(field) → agrupa<br>groupBy(field, function=count()) → cuenta ocurrencias por valor<br>count(), sum(), avg(), max(), min()<br>top(field, limit=10) → top N valores más frecuentes (muy útil para detectar ruido/FP)<br>sort(field, order=desc)<br><br><span style=\"background-color: rgb(145, 0, 22);\">** Tiempo</span><br><br>timeChart(...) → gráfico de eventos en el tiempo<br>bucket() → agrupa por intervalos de tiempo<br><br><span style=\"background-color: rgb(145, 0, 22);\">** Transformación de datos</span><br><br>regex(field, /patron/) → extracción con regex<br>case(field=valor, field2=valor2, ...) → condicionales tipo switch<br>match(field=[...]) → matching por lista de valores<br>format(\"%s-%s\", field=[a,b]) → concatenar/formatear strings<br><br><span style=\"background-color: rgb(145, 0, 22);\">** Control de resultados</span><br><br>head(N) / tail(N) → limitar resultados<br>limit(N)<br><br><span style=\"background-color: rgb(145, 0, 22);\">** Correlación entre eventos</span><br><br>join(...) → correlacionar dos búsquedas (por ejemplo proceso padre-hijo)<br>self-join para eventos relacionados en la misma sesión",

document.addEventListener('DOMContentLoaded', () => {
    let notes = NOTES_DATA.slice();
    let fileHandle = null;      // solo modo standalone (archivo abierto suelto)
    let pendingHandle = null;   // handle recordado en IndexedDB, pendiente de re-confirmar permiso (solo standalone)
    let linkedViaParent = false; // solo modo embebido: true si SPEED tiene el archivo vinculado
    let linkedFileName = '';     // nombre del archivo vinculado, para mostrar en el estado
    let editingIndex = null; // null = modo agregar, número = editando esa nota

    const container = document.getElementById('cardsContainer');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const addBtn = document.getElementById('addBtn');
    const linkBtn = document.getElementById('linkBtn');
    const linkStatus = document.getElementById('linkStatus');

    const viewModal = document.getElementById('viewModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalTag = document.getElementById('modalTag');
    const modalIcon = document.getElementById('modalIcon');
    const modalContent = document.getElementById('modalContent');
    const copyBtn = document.getElementById('copyBtn');
    const editBtn = document.getElementById('editBtn');
    const deleteBtn = document.getElementById('deleteBtn');

    const formModal = document.getElementById('formModal');
    const formTitleHeading = document.getElementById('formTitleHeading');
    const formTitle = document.getElementById('formTitle');
    const formIcon = document.getElementById('formIcon');
    const formTag = document.getElementById('formTag');
    const formContent = document.getElementById('formContent');
    const saveBtn = document.getElementById('saveBtn');

    const toastContainer = document.getElementById('toastContainer');
    const supportsFS = 'showOpenFilePicker' in window;
    // Si corre dentro de un iframe (ej. embebido en SPEED), showOpenFilePicker()
    // directo está bloqueado por el navegador (cross-origin sub-frame). En ese
    // caso se delega el picker a la app madre vía postMessage.
    const embedded = (() => {
        try { return window.top !== window.self; } catch (e) { return true; }
    })();

    // Persistencia del file handle en IndexedDB (más confiable que el
    // "recordado de carpeta" nativo del picker en páginas file://).
    const DB_NAME = 'socNotesLinkDB';
    const STORE_NAME = 'handles';

    function openHandleDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = () => req.result.createObjectStore(STORE_NAME);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    async function saveHandleToDB(handle) {
        try {
            const db = await openHandleDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(handle, 'lastFile');
            await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
        } catch (err) { /* IndexedDB no disponible, se ignora silenciosamente */ }
    }
    async function loadHandleFromDB() {
        try {
            const db = await openHandleDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get('lastFile');
            return await new Promise((res, rej) => { req.onsuccess = () => res(req.result || null); req.onerror = () => rej(req.error); });
        } catch (err) { return null; }
    }

    // Pide una operación a la app madre (contexto top-level) y espera su
    // respuesta por postMessage. `action` es el tipo de operación
    // ('requestFilePicker', 'readLinkedFile', 'writeLinkedFile'); `payload`
    // son datos adicionales serializables (nunca objetos handle).
    function bridgeRequest(action, payload) {
        return new Promise((resolve) => {
            const requestId = action + '-' + Date.now() + '-' + Math.random().toString(36).slice(2);
            let settled = false;

            const timeoutId = setTimeout(() => {
                if (settled) return;
                settled = true;
                window.removeEventListener('message', handler);
                toast('La app madre no respondió la solicitud');
                resolve(null);
            }, 20000);

            function handler(event) {
                const data = event.data;
                if (!data || data.requestId !== requestId) return;
                if (settled) return;
                settled = true;
                clearTimeout(timeoutId);
                window.removeEventListener('message', handler);
                if (data.action && data.action.endsWith('Error')) {
                    if (data.message !== 'AbortError') toast(data.message || 'Ocurrió un error con la app madre');
                    resolve(null);
                } else {
                    resolve(data);
                }
            }
            window.addEventListener('message', handler);
            window.top.postMessage(Object.assign({ action, requestId }, payload || {}), '*');
        });
    }

    function toast(msg) {
        const d = document.createElement('div');
        d.className = 'toast';
        d.textContent = msg;
        toastContainer.appendChild(d);
        setTimeout(() => {
            d.style.opacity = '0';
            d.addEventListener('transitionend', () => d.remove(), { once: true });
        }, 2500);
    }

    function isLinked() {
        return embedded ? linkedViaParent : !!fileHandle;
    }

    function renderLinkStatus() {
        if (embedded) {
            // Dentro de SPEED siempre usamos File System Access API vía el puente,
            // el navegador ya lo soporta (SPEED lo comprobó al abrir el picker).
            if (linkedViaParent) {
                linkBtn.classList.add('linked');
                linkBtn.classList.remove('pending');
                linkBtn.title = 'Vinculado (' + (linkedFileName || 'archivo') + ') — clic para desvincular';
                linkStatus.innerHTML = '<span class="linked"><i class="fas fa-link"></i> Archivo vinculado — los cambios se guardan directo en el .html</span>';
            } else {
                linkBtn.classList.remove('linked', 'pending');
                linkBtn.title = 'Vincular archivo';
                linkStatus.innerHTML = '';
            }
            return;
        }
        if (!supportsFS) {
            linkBtn.disabled = true;
            linkBtn.title = 'Guardado directo no soportado en este navegador';
            linkStatus.innerHTML = 'Tu navegador no soporta guardado directo. Al guardar se descargará el archivo actualizado (reemplaza el original manualmente). Usa Chrome/Edge para guardado directo.';
            return;
        }
        if (fileHandle) {
            linkBtn.classList.add('linked');
            linkBtn.classList.remove('pending');
            linkBtn.title = 'Vinculado — clic para desvincular';
            linkStatus.innerHTML = '<span class="linked"><i class="fas fa-link"></i> Archivo vinculado — los cambios se guardan directo en el .html</span>';
        } else if (pendingHandle) {
            linkBtn.classList.remove('linked');
            linkBtn.classList.add('pending');
            linkBtn.title = 'Clic para reconectar con ' + (pendingHandle.name || 'el archivo recordado');
            linkStatus.innerHTML = '<span>Archivo recordado — clic en <i class="fas fa-link"></i> para reconectar sin buscarlo de nuevo</span>';
        } else {
            linkBtn.classList.remove('linked', 'pending');
            linkBtn.title = 'Vincular archivo';
            linkStatus.innerHTML = '';
        }
    }

    linkBtn.addEventListener('click', async () => {
        if (isLinked()) {
            if (embedded) {
                window.top.postMessage({ action: 'unlinkFile' }, '*');
                linkedViaParent = false;
                linkedFileName = '';
            } else {
                fileHandle = null;
                saveHandleToDB(null);
            }
            renderLinkStatus();
            toast('Archivo desvinculado');
        } else if (!embedded && pendingHandle) {
            try {
                const perm = await pendingHandle.requestPermission({ mode: 'readwrite' });
                if (perm === 'granted') {
                    fileHandle = pendingHandle;
                    pendingHandle = null;
                    renderLinkStatus();
                    toast('Archivo reconectado');
                } else {
                    toast('Permiso denegado');
                }
            } catch (err) {
                toast('No se pudo reconectar, vincula de nuevo');
                pendingHandle = null;
                renderLinkStatus();
            }
        } else {
            linkFile();
        }
    });

    // Al cargar, intenta recuperar el último archivo vinculado desde IndexedDB.
    // Solo aplica en modo standalone: embebido no guarda handles (ver nota arriba).
    (async () => {
        if (embedded || !supportsFS) return;
        const stored = await loadHandleFromDB();
        if (!stored) return;
        try {
            const perm = await stored.queryPermission({ mode: 'readwrite' });
            if (perm === 'granted') {
                fileHandle = stored;
            } else if (perm === 'prompt') {
                pendingHandle = stored;
            }
            renderLinkStatus();
        } catch (err) { /* handle inválido (ej. archivo movido/borrado), se ignora */ }
    })();

    async function linkFile() {
        if (embedded) {
            // Embebido en SPEED (u otra app madre): SPEED es quien abre el picker
            // y se queda con el handle; aquí solo recibimos el nombre y el texto.
            const result = await bridgeRequest('requestFilePicker');
            if (!result) return; // cancelado, denegado o sin respuesta (ya se avisó con un toast)
            if (!result.text || !result.text.includes('===NOTES_DATA_START===')) {
                toast('Ese archivo no parece ser este SOC Notes. Selecciona el mismo archivo que tienes abierto.');
                window.top.postMessage({ action: 'unlinkFile' }, '*');
                return;
            }
            linkedViaParent = true;
            linkedFileName = result.fileName || '';
            renderLinkStatus();
            toast('Archivo vinculado: ' + linkedFileName);
            return;
        }

        try {
            // El "id" ayuda a recordar la carpeta en páginas servidas por http(s);
            // en file:// no siempre persiste, por eso además guardamos el handle en IndexedDB.
            const [handle] = await window.showOpenFilePicker({
                id: 'soc-notes-root-file',
                types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
            });
            const perm = await handle.requestPermission({ mode: 'readwrite' });
            if (perm !== 'granted') { toast('Permiso denegado'); return; }
            const file = await handle.getFile();
            const text = await file.text();
            if (!text.includes('===NOTES_DATA_START===')) {
                toast('Ese archivo no parece ser este SOC Notes. Selecciona el mismo archivo que tienes abierto.');
                return;
            }
            fileHandle = handle;
            pendingHandle = null;
            await saveHandleToDB(handle);
            renderLinkStatus();
            toast('Archivo vinculado: ' + file.name);
        } catch (err) {
            if (err.name !== 'AbortError') toast('No se pudo vincular el archivo');
        }
    }

    function buildUpdatedHtml(currentText) {
        const startMarker = '/* ===NOTES_DATA_START=== */';
        const endMarker = '/* ===NOTES_DATA_END=== */';
        const startIdx = currentText.indexOf(startMarker);
        const endIdx = currentText.indexOf(endMarker);
        if (startIdx === -1 || endIdx === -1) return null;

        const notesBlock = 'const NOTES_DATA = [\n' +
            notes.map(n => '    ' + JSON.stringify(n, null, 4).split('\n').join('\n    ')).join(',\n') +
            '\n];';

        return currentText.slice(0, startIdx + startMarker.length) + '\n' + notesBlock + '\n' +
               currentText.slice(endIdx);
    }

    function downloadUpdated() {
        const newHtml = buildUpdatedHtml(window.__ORIGINAL_HTML__);
        if (!newHtml) { toast('No se pudo generar el archivo'); return; }
        const blob = new Blob([newHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'SOC_Notes.html';
        a.click();
        URL.revokeObjectURL(url);
    }

    async function ensureWritePermission(handle) {
        try {
            const q = await handle.queryPermission({ mode: 'readwrite' });
            if (q === 'granted') return true;
            // requestPermission necesita una activación de usuario real; al llamarse
            // aquí, dentro del manejador del clic de "Guardar" (u otra acción directa
            // del usuario en este mismo iframe), sí cuenta como una.
            const r = await handle.requestPermission({ mode: 'readwrite' });
            return r === 'granted';
        } catch (err) {
            return false;
        }
    }

    async function persistNotesEmbedded() {
        const readRes = await bridgeRequest('readLinkedFile');
        if (!readRes) return false; // ya se avisó con un toast (incluye caso "no hay archivo vinculado")
        const newHtml = buildUpdatedHtml(readRes.text);
        if (!newHtml) { toast('No se encontraron los marcadores en el archivo vinculado'); return false; }
        const writeRes = await bridgeRequest('writeLinkedFile', { content: newHtml });
        if (!writeRes) return false;
        toast('Guardado en el archivo');
        return true;
    }

    async function persistNotes() {
        if (embedded && linkedViaParent) {
            return await persistNotesEmbedded();
        }
        if (fileHandle) {
            try {
                const ok = await ensureWritePermission(fileHandle);
                if (!ok) { toast('Permiso de escritura denegado para el archivo vinculado'); return false; }
                const file = await fileHandle.getFile();
                const text = await file.text();
                const newHtml = buildUpdatedHtml(text);
                if (!newHtml) { toast('No se encontraron los marcadores en el archivo vinculado'); return false; }
                const writable = await fileHandle.createWritable();
                await writable.write(newHtml);
                await writable.close();
                toast('Guardado en el archivo');
                return true;
            } catch (err) {
                toast('Error al guardar: ' + err.message);
                return false;
            }
        } else {
            downloadUpdated();
            toast('Descarga generada — reemplaza tu archivo con este');
            return true;
        }
    }

    function renderCards(searchTerm = '') {
        const term = searchTerm.trim().toLowerCase();
        container.innerHTML = '';

        const filtered = notes
            .map((note, idx) => ({ note, idx }))
            .filter(({ note }) => {
                if (!term) return true;
                const plain = note.richText ? stripHtml(note.content || '') : (note.content || '');
                return (note.title || '').toLowerCase().includes(term)
                    || (note.tag || '').toLowerCase().includes(term)
                    || plain.toLowerCase().includes(term);
            });

        if (term) {
            resultCount.style.display = 'block';
            resultCount.textContent = filtered.length + ' resultado(s) para "' + searchTerm + '"';
        } else {
            resultCount.style.display = 'none';
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="no-results">No se encontraron notas.</div>';
            return;
        }

        filtered.forEach(({ note, idx }) => {
            const card = document.createElement('div');
            card.className = 'note-card';

            const iconHtml = note.icon ? '<i class="' + note.icon + ' note-icon"></i>' : '';
            const tagHtml = note.tag ? '<span class="note-tag">' + note.tag + '</span>' : '';
            const plainForPreview = note.richText ? stripHtml(note.content || '') : (note.content || '');
            const preview = plainForPreview.split('\n')[0];

            card.innerHTML =
                '<i class="fas fa-grip-vertical card-drag-handle" title="Arrastrar para reordenar"></i>' +
                iconHtml +
                '<div class="note-title"></div>' +
                '<div class="note-preview"></div>' +
                tagHtml;
            card.querySelector('.note-title').textContent = note.title || '';
            card.querySelector('.note-preview').textContent = preview;

            card.dataset.idx = idx;
            card.addEventListener('click', () => openViewModal(idx));
            setupDrag(card);
            container.appendChild(card);
        });
    }

    function setupDrag(card) {
        const handle = card.querySelector('.card-drag-handle');
        let dragAllowed = false;

        handle.addEventListener('mousedown', e => { dragAllowed = true; e.stopPropagation(); });
        handle.addEventListener('click', e => e.stopPropagation());
        document.addEventListener('mouseup', () => { dragAllowed = false; });

        card.draggable = true;
        card.addEventListener('dragstart', e => {
            if (!dragAllowed) { e.preventDefault(); return; }
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', card.dataset.idx);
            requestAnimationFrame(() => card.classList.add('dragging'));
        });
        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            document.querySelectorAll('.note-card.drag-over').forEach(c => c.classList.remove('drag-over'));
        });
        card.addEventListener('dragover', e => {
            e.preventDefault();
            card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', async e => {
            e.preventDefault();
            card.classList.remove('drag-over');
            const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
            const toIdx = parseInt(card.dataset.idx, 10);
            if (isNaN(fromIdx) || isNaN(toIdx) || fromIdx === toIdx) return;
            const [moved] = notes.splice(fromIdx, 1);
            notes.splice(toIdx, 0, moved);
            renderCards(searchInput.value);
            await persistNotes();
        });
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function stripHtml(html) {
        const temp = document.createElement('div');
        temp.innerHTML = html;
        return temp.textContent || '';
    }

    // Whitelist de tags/atributos permitidos al guardar contenido del editor enriquecido
    function sanitizeContentHtml(html) {
        const allowedTags = ['B', 'STRONG', 'FONT', 'SPAN', 'A', 'BR', 'DIV', 'I', 'U'];
        const temp = document.createElement('div');
        temp.innerHTML = html;

        function clean(node) {
            Array.from(node.childNodes).forEach(child => {
                if (child.nodeType === 1) {
                    if (!allowedTags.includes(child.tagName)) {
                        while (child.firstChild) node.insertBefore(child.firstChild, child);
                        node.removeChild(child);
                    } else {
                        Array.from(child.attributes).forEach(attr => {
                            const name = attr.name.toLowerCase();
                            const keep =
                                (child.tagName === 'A' && ['href', 'target', 'rel'].includes(name)) ||
                                (child.tagName === 'FONT' && name === 'size') ||
                                (child.tagName === 'SPAN' && name === 'style');
                            if (!keep) child.removeAttribute(attr.name);
                        });
                        if (child.tagName === 'SPAN' && child.hasAttribute('style')) {
                            const bg = child.style.backgroundColor;
                            child.removeAttribute('style');
                            if (bg) child.style.backgroundColor = bg;
                        }
                        clean(child);
                    }
                } else if (child.nodeType !== 3) {
                    node.removeChild(child);
                }
            });
        }
        clean(temp);
        return temp.innerHTML;
    }

    // Convierte URLs sueltas en <a> clickeables, sin tocar el texto que ya está dentro de un <a>
    function linkifyNode(root) {
        const urlRegex = /(https?:\/\/[^\s<]+|www\.[^\s<]+)/g;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode(node) {
                let p = node.parentNode;
                while (p) { if (p.nodeName === 'A') return NodeFilter.FILTER_REJECT; p = p.parentNode; }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const textNodes = [];
        let n;
        while ((n = walker.nextNode())) textNodes.push(n);

        textNodes.forEach(node => {
            const text = node.nodeValue;
            urlRegex.lastIndex = 0;
            if (!urlRegex.test(text)) return;
            urlRegex.lastIndex = 0;
            const frag = document.createDocumentFragment();
            let lastIndex = 0, match;
            while ((match = urlRegex.exec(text))) {
                if (match.index > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
                const a = document.createElement('a');
                a.href = match[0].startsWith('www.') ? `https://${match[0]}` : match[0];
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = match[0];
                frag.appendChild(a);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
            node.parentNode.replaceChild(frag, node);
        });
    }

    function linkify(str) {
        return escapeHtml(str).replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+)/g, (match) => {
            const href = match.startsWith('www.') ? `https://${match}` : match;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer">${match}</a>`;
        });
    }

    function openViewModal(idx) {
        const note = notes[idx];
        modalTitle.textContent = note.title || '';
        modalTag.textContent = note.tag || '';
        modalIcon.className = note.icon || '';

        if (note.richText) {
            modalContent.innerHTML = note.content || '';
            linkifyNode(modalContent);
        } else {
            modalContent.innerHTML = linkify(note.content || '');
        }
        const plainContent = note.richText ? stripHtml(note.content || '') : (note.content || '');
        const viewCharCounter = document.getElementById('viewCharCounter');
        if (viewCharCounter) viewCharCounter.textContent = `${plainContent.length} chars`;
        viewModal.classList.remove('hidden');

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(plainContent).then(() => {
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.innerHTML = '<i class="fas fa-copy"></i>'; }, 1500);
            });
        };
        editBtn.onclick = () => { viewModal.classList.add('hidden'); openFormModal(idx); };
        deleteBtn.onclick = async () => {
            if (!confirm('¿Eliminar esta nota permanentemente?')) return;
            notes.splice(idx, 1);
            viewModal.classList.add('hidden');
            renderCards(searchInput.value);
            await persistNotes();
        };
    }

    function openFormModal(idx) {
        editingIndex = (typeof idx === 'number') ? idx : null;
        if (editingIndex !== null) {
            const note = notes[editingIndex];
            formTitleHeading.textContent = 'Editar nota';
            formTitle.value = note.title || '';
            formIcon.value = note.icon || '';
            formTag.value = note.tag || '';
            if (note.richText) {
                formContent.innerHTML = note.content || '';
            } else {
                formContent.innerHTML = escapeHtml(note.content || '').replace(/\n/g, '<br>');
            }
        } else {
            formTitleHeading.textContent = 'Nueva nota';
            formTitle.value = '';
            formIcon.value = '';
            formTag.value = '';
            formContent.innerHTML = '';
        }
        formModal.classList.remove('hidden');
        formTitle.focus();
    }

    const HIGHLIGHT_COLOR = '#910016';
    const btnBold = document.getElementById('btnBold');
    const btnHighlight = document.getElementById('btnHighlight');
    const btnUnhighlight = document.getElementById('btnUnhighlight');
    const btnSizeNormal = document.getElementById('btnSizeNormal');
    const btnSizeBig = document.getElementById('btnSizeBig');

    function withEditorFocus(fn) {
        return (e) => {
            e.preventDefault();
            formContent.focus();
            fn();
        };
    }

    btnBold.addEventListener('mousedown', e => e.preventDefault());
    btnBold.addEventListener('click', withEditorFocus(() => document.execCommand('bold')));

    btnHighlight.addEventListener('mousedown', e => e.preventDefault());
    btnHighlight.addEventListener('click', withEditorFocus(() => {
        try { document.execCommand('hiliteColor', false, HIGHLIGHT_COLOR); }
        catch (err) { document.execCommand('backColor', false, HIGHLIGHT_COLOR); }
    }));

    btnUnhighlight.addEventListener('mousedown', e => e.preventDefault());
    btnUnhighlight.addEventListener('click', withEditorFocus(() => {
        try { document.execCommand('hiliteColor', false, 'transparent'); }
        catch (err) { document.execCommand('backColor', false, 'transparent'); }
    }));

    btnSizeNormal.addEventListener('mousedown', e => e.preventDefault());
    btnSizeNormal.addEventListener('click', withEditorFocus(() => {
        document.execCommand('fontSize', false, '3');
        btnSizeNormal.classList.add('active');
        btnSizeBig.classList.remove('active');
    }));

    btnSizeBig.addEventListener('mousedown', e => e.preventDefault());
    btnSizeBig.addEventListener('click', withEditorFocus(() => {
        document.execCommand('fontSize', false, '5');
        btnSizeBig.classList.add('active');
        btnSizeNormal.classList.remove('active');
    }));

    saveBtn.addEventListener('click', async () => {
        const title = formTitle.value.trim();
        const rawHtml = sanitizeContentHtml(formContent.innerHTML);
        const plain = stripHtml(rawHtml).trim();
        if (!title || !plain) { toast('Título y contenido son obligatorios'); return; }

        const noteObj = {
            title,
            icon: formIcon.value.trim(),
            tag: formTag.value.trim(),
            content: rawHtml,
            richText: true
        };
        if (!noteObj.icon) delete noteObj.icon;
        if (!noteObj.tag) delete noteObj.tag;

        if (editingIndex !== null) {
            notes[editingIndex] = noteObj;
        } else {
            notes.push(noteObj);
        }
        formModal.classList.add('hidden');
        renderCards(searchInput.value);
        await persistNotes();
    });

    addBtn.addEventListener('click', () => openFormModal());

    document.querySelectorAll('[data-close]').forEach(btn => {
        btn.addEventListener('click', () => document.getElementById(btn.dataset.close).classList.add('hidden'));
    });
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        let mouseDownOnOverlay = false;
        overlay.addEventListener('mousedown', e => { mouseDownOnOverlay = (e.target === overlay); });
        overlay.addEventListener('click', e => {
            if (e.target === overlay && mouseDownOnOverlay) overlay.classList.add('hidden');
            mouseDownOnOverlay = false;
        });
    });
    window.addEventListener('keydown', e => {
        if (e.key === 'Escape') { viewModal.classList.add('hidden'); formModal.classList.add('hidden'); }
    });

    searchInput.addEventListener('input', e => renderCards(e.target.value));

    // Guardamos el HTML original completo (tal como fue servido) para poder
    // reconstruirlo al descargar en navegadores sin File System Access API.
    window.__ORIGINAL_HTML__ = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

    renderLinkStatus();
    renderCards();
});
</script>
</body>
</html>
